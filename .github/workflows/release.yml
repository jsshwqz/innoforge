name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Git tag to build (e.g. v0.6.0)'
        required: false
        type: string
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
      fail-fast: false

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref_name }}

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build release
        run: cargo build --release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: innoforge-${{ matrix.os }}
          path: |
            target/release/innoforge
            target/release/innoforge.exe
          if-no-files-found: warn

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref_name }}

      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Generate release notes
        id: release_notes
        run: |
          if [ -f CHANGELOG.md ]; then
            # Extract the latest version section from CHANGELOG
            awk '/^## /{if(++c==2) exit} c==1' CHANGELOG.md > release_notes.md
          else
            echo "Release $(echo ${{ github.ref_name }} | sed 's/^v//')" > release_notes.md
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          body_path: release_notes.md
          make_latest: true
          files: |
            innoforge-ubuntu-latest/innoforge
            innoforge-windows-latest/innoforge.exe
            innoforge-macos-latest/innoforge
          fail_on_unmatched_files: false
