name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset: patent-hub-linux-x86_64.tar.gz
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            asset: patent-hub-linux-aarch64.tar.gz
            cross: true
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset: patent-hub-windows-x86_64.zip
          - os: macos-latest
            target: x86_64-apple-darwin
            asset: patent-hub-macos-x86_64.tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            asset: patent-hub-macos-aarch64.tar.gz

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      # cross 用于 Linux aarch64 交叉编译
      - name: Install cross
        if: matrix.cross == true
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build (native)
        if: matrix.cross != true
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build (cross)
        if: matrix.cross == true
        run: cross build --release --target ${{ matrix.target }}

      # ── Package Unix ──────────────────────────────────────────────────────
      - name: Package (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          BIN_DIR="target/${{ matrix.target }}/release"
          mkdir -p pkg
          cp "$BIN_DIR/patent-hub"    pkg/
          cp "$BIN_DIR/skill-router"  pkg/
          cp -r templates static .env.example pkg/
          [ -f README.md ] && cp README.md pkg/ || true
          [ -f LICENSE ] && cp LICENSE pkg/ || true

          cat > pkg/start.sh << 'EOF'
          #!/bin/bash
          cd "$(dirname "$0")"
          ./patent-hub
          EOF
          chmod +x pkg/start.sh pkg/patent-hub pkg/skill-router

          cat > pkg/USAGE.txt << 'EOF'
          # Patent Hub + Skill Router

          ## Start web server
            ./start.sh
            # or: ./patent-hub

          ## Use skill-router CLI
            ./skill-router "parse this yaml"
            ./skill-router -c text_summarize -x '{"text":"hello world"}' summarize
            ./skill-router --gc --days 30

          ## Configure
            cp .env.example .env
            # Edit .env with your API keys
          EOF

          cd pkg && tar czf "../${{ matrix.asset }}" .

      # ── Package Windows ───────────────────────────────────────────────────
      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $binDir = "target\${{ matrix.target }}\release"
          New-Item -ItemType Directory -Path pkg -Force | Out-Null
          Copy-Item "$binDir\patent-hub.exe"   pkg\
          Copy-Item "$binDir\skill-router.exe" pkg\
          Copy-Item -Recurse templates, static pkg\
          Copy-Item .env.example pkg\
          if (Test-Path README.md) { Copy-Item README.md pkg\ }
          if (Test-Path LICENSE) { Copy-Item LICENSE pkg\ }

          @'
          @echo off
          cd /d "%~dp0"
          patent-hub.exe
          '@ | Set-Content pkg\start.bat -Encoding ASCII

          @'
          # Patent Hub + Skill Router

          ## Start web server
            start.bat
            or: patent-hub.exe

          ## Use skill-router CLI
            skill-router.exe "parse this yaml"
            skill-router.exe -c text_summarize -x "{\"text\":\"hello world\"}" summarize
            skill-router.exe --gc --days 30

          ## Configure
            copy .env.example .env
            Edit .env with your API keys
          '@ | Set-Content pkg\USAGE.txt -Encoding UTF8

          Compress-Archive -Path pkg\* -DestinationPath "${{ matrix.asset }}" -Force

      # ── Upload ────────────────────────────────────────────────────────────
      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.asset }}
          generate_release_notes: true

  build-android:
    name: 构建 Android APK（纯 Rust）
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 安装 Android SDK 和 NDK
        uses: android-actions/setup-android@v3

      - run: sdkmanager "ndk;27.0.12077973"

      - name: 安装 cargo-ndk
        run: cargo install cargo-ndk

      - name: 交叉编译 Rust 共享库（cdylib）
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/27.0.12077973
        run: |
          cargo ndk -t arm64-v8a build --release --lib
          ls -la target/aarch64-linux-android/release/libpatent_hub.so

      - name: 打包 APK
        run: |
          # 创建 APK 目录结构
          mkdir -p apk-build/lib/arm64-v8a
          mkdir -p apk-build/assets/templates
          mkdir -p apk-build/assets/static

          # 复制 cdylib 共享库
          cp target/aarch64-linux-android/release/libpatent_hub.so apk-build/lib/arm64-v8a/libpatent_hub.so

          # 复制 Web 资源
          cp templates/*.html apk-build/assets/templates/
          cp -r static/* apk-build/assets/static/

          # 创建 AndroidManifest.xml
          cat > apk-build/AndroidManifest.xml << 'MANIFEST'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              package="com.patenthub.app"
              android:versionCode="3"
              android:versionName="0.3.3">
              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />
              <uses-sdk android:minSdkVersion="24" android:targetSdkVersion="34" />
              <application
                  android:label="Patent Hub"
                  android:usesCleartextTraffic="true"
                  android:networkSecurityConfig="@xml/network_security_config">
                  <activity
                      android:name="android.app.NativeActivity"
                      android:exported="true"
                      android:configChanges="orientation|screenSize|keyboardHidden">
                      <meta-data android:name="android.app.lib_name" android:value="patent_hub" />
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          MANIFEST

          # 创建网络安全配置
          mkdir -p apk-build/res/xml
          cat > apk-build/res/xml/network_security_config.xml << 'NETXML'
          <?xml version="1.0" encoding="utf-8"?>
          <network-security-config>
            <domain-config cleartextTrafficPermitted="true">
              <domain includeSubdomains="false">localhost</domain>
              <domain includeSubdomains="false">127.0.0.1</domain>
            </domain-config>
          </network-security-config>
          NETXML

          # 创建 Java WebView Activity（约30行，唯一的 Java 代码）
          mkdir -p java-src/com/patenthub/app
          cat > java-src/com/patenthub/app/MainActivity.java << 'JAVAEOF'
          package com.patenthub.app;
          import android.app.Activity;
          import android.os.Bundle;
          import android.webkit.WebView;
          import android.webkit.WebViewClient;
          import android.webkit.WebSettings;
          import android.webkit.WebChromeClient;
          import android.view.Window;
          import android.view.WindowManager;
          public class MainActivity extends Activity {
              static { System.loadLibrary("patent_hub"); }
              private static native void startServer(String dbPath);
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  requestWindowFeature(Window.FEATURE_NO_TITLE);
                  getWindow().setFlags(WindowManager.LayoutParams.FLAG_FULLSCREEN,
                      WindowManager.LayoutParams.FLAG_FULLSCREEN);
                  String dbPath = getFilesDir().getAbsolutePath() + "/patent_hub.db";
                  new Thread(() -> startServer(dbPath)).start();
                  try { Thread.sleep(1500); } catch (Exception e) {}
                  WebView webView = new WebView(this);
                  WebSettings s = webView.getSettings();
                  s.setJavaScriptEnabled(true);
                  s.setDomStorageEnabled(true);
                  s.setAllowFileAccess(true);
                  s.setMixedContentMode(WebSettings.MIXED_CONTENT_ALWAYS_ALLOW);
                  webView.setWebViewClient(new WebViewClient());
                  webView.setWebChromeClient(new WebChromeClient());
                  setContentView(webView);
                  webView.loadUrl("http://127.0.0.1:3000/search");
              }
          }
          JAVAEOF

          # 更新 AndroidManifest 指向 Java Activity
          cat > apk-build/AndroidManifest.xml << 'MANIFEST'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              package="com.patenthub.app"
              android:versionCode="32"
              android:versionName="0.3.3">
              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />
              <uses-sdk android:minSdkVersion="24" android:targetSdkVersion="34" />
              <application
                  android:label="Patent Hub"
                  android:usesCleartextTraffic="true"
                  android:networkSecurityConfig="@xml/network_security_config">
                  <activity
                      android:name="com.patenthub.app.MainActivity"
                      android:exported="true"
                      android:configChanges="orientation|screenSize|keyboardHidden">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          MANIFEST

          # 编译 Java → class → dex
          BT=$(ls ${ANDROID_HOME}/build-tools/ | sort -V | tail -1)
          AAPT2="${ANDROID_HOME}/build-tools/${BT}/aapt2"
          PLATFORM=$(ls -d ${ANDROID_HOME}/platforms/android-* | sort -V | tail -1)
          D8="${ANDROID_HOME}/build-tools/${BT}/d8"

          javac -source 11 -target 11 -classpath ${PLATFORM}/android.jar \
            -d java-classes java-src/com/patenthub/app/MainActivity.java

          find java-classes -name '*.class' | xargs ${D8} --output apk-build/

          # 编译资源
          ${AAPT2} compile --dir apk-build/res -o compiled.zip

          # 链接生成 APK
          ${AAPT2} link -o patent-hub-unsigned.apk \
            -I ${PLATFORM}/android.jar \
            --manifest apk-build/AndroidManifest.xml \
            compiled.zip

          # 添加 native library, assets, classes.dex
          cd apk-build && zip -r ../patent-hub-unsigned.apk lib/ assets/ classes.dex && cd ..

          # 对齐
          ${ANDROID_HOME}/build-tools/${BT}/zipalign -f 4 patent-hub-unsigned.apk patent-hub-aligned.apk

          # 签名
          keytool -genkeypair -v \
            -keystore patent-hub.keystore \
            -alias patent-hub \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass patent-hub-2024 \
            -keypass patent-hub-2024 \
            -dname "CN=Patent Hub, OU=Dev, O=Patent Hub, L=SZ, ST=GD, C=CN"

          ${ANDROID_HOME}/build-tools/${BT}/apksigner sign \
            --ks patent-hub.keystore \
            --ks-key-alias patent-hub \
            --ks-pass pass:patent-hub-2024 \
            --key-pass pass:patent-hub-2024 \
            patent-hub-aligned.apk

          cp patent-hub-aligned.apk patent-hub-android.apk
          echo "APK 大小: $(stat -c%s patent-hub-android.apk) bytes"

      - name: Upload APK
        uses: softprops/action-gh-release@v2
        with:
          files: patent-hub-android.apk

  # ── Tauri v2 iOS 构建 ─────────────────────────────────────────────────────
  # 除此原生 Xcode 构建外，另有独立的 Tauri v2 iOS 工作流：
  #   .github/workflows/ios-build.yml
  # 该工作流使用 `cargo tauri ios build` 命令，适合标准 Tauri 应用场景。
  # 详细文档见 docs/ios-build.md

  build-ios:
    name: 构建 iOS IPA
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios

      - uses: Swatinem/rust-cache@v2
        with:
          key: ios-aarch64

      - name: 交叉编译 Rust 静态库（staticlib）
        run: |
          cargo build --release --lib --target aarch64-apple-ios
          ls -la target/aarch64-apple-ios/release/libpatent_hub.a

      - name: 准备 Xcode 项目并构建 IPA
        run: |
          cd ios-app

          # 将 Rust 静态库复制到 Xcode 项目引用位置
          mkdir -p PatentHub/libs
          cp ../target/aarch64-apple-ios/release/libpatent_hub.a PatentHub/libs/

          # 构建 archive（无签名，用于侧载或企业分发）
          xcodebuild archive \
            -project PatentHub.xcodeproj \
            -scheme PatentHub \
            -configuration Release \
            -archivePath build/PatentHub.xcarchive \
            -destination "generic/platform=iOS" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            ARCHS=arm64 \
            ONLY_ACTIVE_ARCH=NO

          # 从 archive 生成 IPA
          mkdir -p build/Payload
          cp -r build/PatentHub.xcarchive/Products/Applications/PatentHub.app build/Payload/
          cd build && zip -r ../../patent-hub-ios.ipa Payload/
          cd ../..
          echo "IPA 大小: $(stat -f%z patent-hub-ios.ipa) bytes"

      - name: Upload IPA
        uses: softprops/action-gh-release@v2
        with:
          files: patent-hub-ios.ipa

  # ── HarmonyOS HAP ──────────────────────────────────────────────────────────
  # 注意：GitHub Actions 目前没有 DevEco Studio 环境，
  # HarmonyOS HAP 需要在本地使用 DevEco Studio 手动构建。
  # 此 Job 仅作为占位和文档说明。
  #
  # Note: GitHub Actions does not have DevEco Studio available.
  # HarmonyOS HAP must be built locally with DevEco Studio.
  # This job serves as a placeholder and documentation.
  #
  # 本地构建步骤 / Local build steps:
  #   cd harmonyos && ./build.sh release
  #   然后手动上传 patent-hub-harmonyos.hap 到 Release
  #   Then manually upload patent-hub-harmonyos.hap to the Release
  build-harmonyos:
    name: 构建 HarmonyOS HAP（需手动构建）
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: HarmonyOS 构建说明 / HarmonyOS build instructions
        run: |
          echo "============================================"
          echo " HarmonyOS HAP 需要 DevEco Studio 构建"
          echo " HarmonyOS HAP requires DevEco Studio"
          echo "============================================"
          echo ""
          echo "GitHub Actions 暂不支持 DevEco Studio 环境。"
          echo "GitHub Actions does not support DevEco Studio yet."
          echo ""
          echo "请在本地执行以下步骤 / Please follow these steps locally:"
          echo ""
          echo "  1. 安装 DevEco Studio 5.0+ (NEXT)"
          echo "     Install DevEco Studio 5.0+ (NEXT)"
          echo "     https://developer.huawei.com/consumer/cn/deveco-studio/"
          echo ""
          echo "  2. 安装 HarmonyOS SDK API 12+"
          echo "     Install HarmonyOS SDK API 12+"
          echo ""
          echo "  3. 执行构建脚本 / Run build script:"
          echo "     cd harmonyos && ./build.sh release"
          echo ""
          echo "  4. 上传 HAP 到 Release / Upload HAP to Release:"
          echo "     gh release upload <tag> patent-hub-harmonyos.hap"
          echo ""
          echo "项目配置 / Project config:"
          echo "  Bundle: com.patenthub.app"
          echo "  Version: 0.4.0"
          echo "  API: 12+ (HarmonyOS NEXT)"
          echo "  设备 / Devices: phone, tablet"

      - name: 验证项目文件完整性 / Verify project file integrity
        run: |
          echo "检查 HarmonyOS 项目文件 / Checking HarmonyOS project files..."
          FILES=(
            "harmonyos/AppScope/app.json5"
            "harmonyos/build-profile.json5"
            "harmonyos/hvigorfile.ts"
            "harmonyos/oh-package.json5"
            "harmonyos/hvigor/hvigor-config.json5"
            "harmonyos/entry/hvigorfile.ts"
            "harmonyos/entry/build-profile.json5"
            "harmonyos/entry/oh-package.json5"
            "harmonyos/entry/src/main/module.json5"
            "harmonyos/entry/src/main/ets/entryability/EntryAbility.ets"
            "harmonyos/entry/src/main/ets/pages/Index.ets"
            "harmonyos/entry/src/main/ets/pages/Splash.ets"
            "harmonyos/entry/src/main/resources/base/profile/main_pages.json"
          )
          MISSING=0
          for f in "${FILES[@]}"; do
            if [ -f "$f" ]; then
              echo "  [OK] $f"
            else
              echo "  [MISSING] $f"
              MISSING=$((MISSING + 1))
            fi
          done
          if [ $MISSING -gt 0 ]; then
            echo ""
            echo "警告: ${MISSING} 个文件缺失 / Warning: ${MISSING} files missing"
            exit 1
          fi
          echo ""
          echo "所有项目文件完整 / All project files present"
