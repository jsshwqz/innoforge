<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>API 测试</title>
    <style>
        body { background: #0d1117; color: #c9d1d9; font-family: monospace; padding: 20px; }
        button { padding: 10px 20px; background: #238636; color: white; border: none; cursor: pointer; }
        pre { background: #161b22; padding: 15px; border-radius: 6px; overflow-x: auto; }
        .error { color: #f85149; }
        .success { color: #3fb950; }
    </style>
</head>
<body>
    <h2>🔍 Patent Hub API 测试</h2>
    
    <h3>1. 测试服务器状态</h3>
    <button onclick="testServer()">测试服务器</button>
    <pre id="server-result">等待测试...</pre>
    
    <h3>2. 测试在线搜索 API</h3>
    <button onclick="testOnlineSearch()">测试在线搜索</button>
    <pre id="search-result">等待测试...</pre>
    
    <h3>3. 测试本地搜索 API</h3>
    <button onclick="testLocalSearch()">测试本地搜索</button>
    <pre id="local-result">等待测试...</pre>
    
    <h3>4. 查看当前配置</h3>
    <button onclick="testSettings()">查看配置</button>
    <pre id="settings-result">等待测试...</pre>

    <script>
        async function testServer() {
            const el = document.getElementById('server-result');
            el.textContent = '测试中...';
            try {
                const res = await fetch('/');
                el.className = 'success';
                el.textContent = `✅ 服务器正常运行\n状态码: ${res.status}`;
            } catch (e) {
                el.className = 'error';
                el.textContent = `❌ 服务器连接失败\n错误: ${e.message}`;
            }
        }

        async function testOnlineSearch() {
            const el = document.getElementById('search-result');
            el.textContent = '测试中...';
            try {
                const res = await fetch('/api/search/online', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query: '人工智能', page: 1, page_size: 5 })
                });
                const data = await res.json();
                el.className = data.patents && data.patents.length > 0 ? 'success' : 'error';
                el.textContent = JSON.stringify(data, null, 2);
            } catch (e) {
                el.className = 'error';
                el.textContent = `❌ 请求失败\n错误: ${e.message}`;
            }
        }

        async function testLocalSearch() {
            const el = document.getElementById('local-result');
            el.textContent = '测试中...';
            try {
                const res = await fetch('/api/search', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query: '人工智能', page: 1, page_size: 5 })
                });
                const data = await res.json();
                el.className = data.patents && data.patents.length > 0 ? 'success' : 'error';
                el.textContent = JSON.stringify(data, null, 2);
            } catch (e) {
                el.className = 'error';
                el.textContent = `❌ 请求失败\n错误: ${e.message}`;
            }
        }

        async function testSettings() {
            const el = document.getElementById('settings-result');
            el.textContent = '测试中...';
            try {
                const res = await fetch('/api/settings');
                const data = await res.json();
                el.className = 'success';
                // 隐藏 API Key 的部分字符
                if (data.serpapi_key) {
                    data.serpapi_key = data.serpapi_key.substring(0, 10) + '...' + data.serpapi_key.substring(data.serpapi_key.length - 10);
                }
                if (data.ai_api_key) {
                    data.ai_api_key = data.ai_api_key.substring(0, 10) + '...';
                }
                el.textContent = JSON.stringify(data, null, 2);
            } catch (e) {
                el.className = 'error';
                el.textContent = `❌ 请求失败\n错误: ${e.message}`;
            }
        }
    </script>
</body>
</html>
