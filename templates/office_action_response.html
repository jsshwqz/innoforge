<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OA答复 - 创研台</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="manifest" href="/static/manifest.json">
    <meta name="theme-color" content="#0d1117">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="icon" href="/static/icon.svg" type="image/svg+xml">
    <script src="/static/purify.min.js"></script>
<style>
.cmp-input { width:100%; padding:10px; background:#0d1117; border:1px solid #30363d; border-radius:6px; color:#c9d1d9; }
.cmp-label { display:block; margin-bottom:6px; color:#8b949e; font-size:13px; }
.cmp-section { background:#161b22; border:1px solid #30363d; border-radius:8px; padding:16px; margin-bottom:16px; }
.cmp-my { border-left:3px solid #f0883e; }
.cmp-ref { border-left:3px solid #58a6ff; }
.ref-row { display:flex; gap:8px; align-items:center; margin-bottom:8px; }
.ref-row input { flex:1; }
.btn-add { background:#21262d; border:1px solid #30363d; color:#58a6ff; padding:6px 14px; border-radius:6px; cursor:pointer; font-size:13px; }
.btn-add:hover { background:#30363d; }
.btn-remove { background:none; border:none; color:#f85149; cursor:pointer; font-size:18px; padding:4px 8px; }
.btn-remove:hover { color:#ff7b72; }
.btn-upload { background:#21262d; border:1px solid #30363d; color:#c9d1d9; padding:6px 10px; border-radius:6px; cursor:pointer; font-size:13px; white-space:nowrap; }
.btn-upload:hover { background:#30363d; color:#58a6ff; }
.btn-primary { padding:12px 24px; background:#58a6ff; color:#fff; border:none; border-radius:6px; cursor:pointer; font-size:15px; font-weight:600; }
.btn-primary:hover { background:#79c0ff; }
.btn-primary:disabled { opacity:0.5; cursor:not-allowed; }
.btn-row { display:flex; gap:12px; margin-top:16px; flex-wrap:wrap; align-items:center; }
.result-box { margin-top:20px; background:#161b22; border:1px solid #30363d; border-radius:8px; padding:20px; color:#c9d1d9; line-height:1.8; }
.result-box h3, .result-box h2 { color:#58a6ff; }
.result-box .oa-table-scroll { width:100%; overflow-x:auto; overscroll-behavior-x:contain; margin:12px 0; border:1px solid #30363d; border-radius:6px; }
.result-box table { width:100%; min-width:680px; border-collapse:collapse; margin:0; font-size:14px; }
.result-box th { background:#21262d; color:#c9d1d9; padding:8px 10px; border:1px solid #30363d; text-align:left; white-space:normal; overflow-wrap:anywhere; }
.result-box td { padding:8px 10px; border:1px solid #30363d; vertical-align:top; white-space:normal; overflow-wrap:anywhere; word-break:break-word; }
.result-box tr:nth-child(even) { background:#0d1117; }
.result-box strong { color:#f0883e; }
.result-box code { background:#21262d; padding:1px 5px; border-radius:3px; font-size:0.9em; }
.result-box li { margin-bottom:4px; }
.result-box pre { background:#0d1117; border:1px solid #30363d; border-radius:6px; padding:10px; overflow-x:auto; font-size:0.85em; }
.file-tag { display:inline-flex; align-items:center; gap:4px; background:#1f6feb22; border:1px solid #1f6feb; color:#58a6ff; padding:4px 10px; border-radius:999px; font-size:12px; margin-top:4px; }
.file-tag .tag-remove { cursor:pointer; color:#f85149; margin-left:4px; font-size:14px; }
.file-tag .tag-remove:hover { color:#ff7b72; }
.my-input-row { display:flex; gap:8px; align-items:center; }
.my-input-row input { flex:1; }
.btn-paste { background:#21262d; border:1px solid #30363d; color:#c9d1d9; padding:6px 10px; border-radius:6px; cursor:pointer; font-size:13px; white-space:nowrap; }
.btn-paste:hover { background:#30363d; color:#f0883e; }
.paste-modal-overlay { display:none; position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.6); z-index:1000; justify-content:center; align-items:center; }
.paste-modal-overlay.show { display:flex; }
.paste-modal { background:#161b22; border:1px solid #30363d; border-radius:10px; padding:20px; width:90%; max-width:700px; max-height:80vh; display:flex; flex-direction:column; }
.paste-modal h3 { color:#c9d1d9; margin:0 0 8px 0; font-size:16px; }
.paste-modal textarea { flex:1; min-height:260px; background:#0d1117; border:1px solid #30363d; border-radius:6px; color:#c9d1d9; padding:10px; font-size:13px; resize:vertical; line-height:1.6; }
.paste-modal .modal-btns { display:flex; gap:8px; margin-top:12px; justify-content:flex-end; }
.paste-modal .modal-btns button { padding:8px 18px; border-radius:6px; border:none; cursor:pointer; font-size:14px; }
.paste-modal .btn-modal-ok { background:#58a6ff; color:#fff; }
.paste-modal .btn-modal-ok:hover { background:#79c0ff; }
.paste-modal .btn-modal-cancel { background:#21262d; color:#c9d1d9; border:1px solid #30363d; }
.paste-modal .btn-modal-cancel:hover { background:#30363d; }
.paste-title-input { width:100%; padding:8px; background:#0d1117; border:1px solid #30363d; border-radius:6px; color:#c9d1d9; font-size:13px; margin-bottom:8px; }
/* Result toolbar */
.result-toolbar { display:flex; gap:8px; margin-bottom:12px; padding-bottom:12px; border-bottom:1px solid #30363d; }
.result-toolbar button { background:#21262d; border:1px solid #30363d; color:#c9d1d9; padding:6px 14px; border-radius:6px; cursor:pointer; font-size:13px; }
.result-toolbar button:hover { background:#30363d; color:#58a6ff; }
/* OA type selector */
.oa-type-option { cursor:pointer; padding:10px 16px; border:2px solid #30363d; border-radius:8px; display:flex; align-items:center; gap:8px; transition:border-color 0.2s; }
.oa-type-option:hover { border-color:#8b949e; }
.oa-type-option input { accent-color:#d2a8ff; }
/* Discussion panel */
.discussion-panel { margin-top:16px; border-top:1px solid #30363d; padding-top:16px; }
.discussion-panel.hidden { display:none; }
.discussion-header { display:flex; align-items:center; gap:8px; margin-bottom:12px; color:#8b949e; font-weight:600; font-size:14px; }
.discussion-messages { max-height:400px; overflow-y:auto; display:flex; flex-direction:column; gap:10px; margin-bottom:12px; padding-right:4px; position:relative; }
.msg { display:flex; }
.msg-user { justify-content:flex-end; }
.msg-ai { justify-content:flex-start; }
.msg-bubble { max-width:80%; padding:10px 14px; border-radius:10px; font-size:13px; line-height:1.6; word-break:break-word; }
.msg-user .msg-bubble { background:#1f6feb; color:#fff; border-bottom-right-radius:4px; }
.msg-ai .msg-bubble { background:#21262d; color:#c9d1d9; border:1px solid #30363d; border-bottom-left-radius:4px; }
.discussion-input-row { display:flex; gap:8px; }
.discussion-input-row input { flex:1; padding:10px; background:#0d1117; border:1px solid #30363d; border-radius:6px; color:#c9d1d9; font-size:13px; }
.discussion-input-row input:focus { border-color:#58a6ff; outline:none; }
.discussion-input-row button { padding:8px 18px; background:#21262d; color:#c9d1d9; border:1px solid #30363d; border-radius:6px; cursor:pointer; font-size:13px; font-weight:500; white-space:nowrap; }
.discussion-input-row button:hover { background:#30363d; color:#58a6ff; }
.discussion-input-row button:disabled { opacity:0.5; cursor:not-allowed; }
.quote-btn { position:absolute; background:#238636; color:#fff; padding:4px 10px; border-radius:4px; font-size:12px; cursor:pointer; z-index:100; display:none; user-select:none; }
.quote-btn:hover { background:#2ea043; }
.arg-card { padding:8px 10px; background:#161b22; border:1px solid #30363d; border-radius:6px; font-size:12px; display:flex; align-items:flex-start; gap:8px; }
.arg-card .arg-type { font-size:10px; padding:1px 6px; border-radius:3px; white-space:nowrap; font-weight:600; }
.arg-type-confirmed { background:#23863622; color:#3fb950; border:1px solid #238636; }
.arg-type-pending { background:#d2992222; color:#d29922; border:1px solid #d29922; }
.arg-type-risk { background:#da363322; color:#f85149; border:1px solid #da3633; }
.arg-card .arg-text { flex:1; color:#c9d1d9; line-height:1.5; }
.arg-card .arg-actions { display:flex; gap:4px; }
.arg-card .arg-actions button { background:none; border:1px solid #30363d; border-radius:3px; color:#8b949e; cursor:pointer; font-size:11px; padding:2px 6px; }
.arg-card .arg-actions button:hover { background:#30363d; color:#c9d1d9; }
.arg-card.adopted { opacity:0.5; border-color:#3fb950; }
.arg-card.adopted .arg-actions button { display:none; }
.arg-card.rejected { opacity:0.4; text-decoration:line-through; }
.arg-card.rejected .arg-actions button { display:none; }
.diff-add { background:#23863622; color:#3fb950; }
.diff-remove { background:#da363322; color:#f85149; text-decoration:line-through; }
.matrix-cell-yes { color:#3fb950; }
.matrix-cell-no { color:#f85149; }
.matrix-cell-part { color:#d29922; }
</style>
</head>
<body>
    <nav id="global-nav"></nav>
    <div class="page-with-sidebar">
    <main class="container page-main" style="max-width:1100px;">
        <h2 data-i18n="oar.title" style="margin-bottom:16px;"></h2>

        <!-- OA Type Selector -->
        <div class="cmp-section" style="border-left:3px solid #d2a8ff;">
            <label class="cmp-label" data-i18n="oar.typeLabel" style="color:#d2a8ff;font-weight:600;"></label>
            <div style="display:flex; gap:12px; flex-wrap:wrap;">
                <label class="oa-type-option" id="oa-type-first-exam">
                    <input type="radio" name="oa_type" value="first_exam" checked>
                    <span data-i18n="oar.typeFirstExam"></span>
                </label>
                <label class="oa-type-option" id="oa-type-abnormal">
                    <input type="radio" name="oa_type" value="abnormal">
                    <span data-i18n="oar.typeAbnormal"></span>
                </label>
                <label class="oa-type-option" id="oa-type-reject-review">
                    <input type="radio" name="oa_type" value="reject_review">
                    <span data-i18n="oar.typeRejectReview"></span>
                </label>
            </div>
        </div>

        <!-- My Patent -->
        <div class="cmp-section cmp-my">
            <label class="cmp-label" style="color:#f0883e;font-weight:600;" data-i18n="oar.myPatent"></label>
            <div class="my-input-row">
                <input type="text" id="my-patent" class="cmp-input" data-i18n-placeholder="oar.myPatentPlaceholder">
                <button class="btn-upload" onclick="uploadMyPatent()">📎 <span data-i18n="common.upload"></span></button>
                <button class="btn-paste" onclick="pasteMyPatent()">📋 <span data-i18n="common.paste"></span></button>
                <button class="btn-add" onclick="lookupMyPatent()">🔍 <span data-i18n="oar.lookup"></span></button>
            </div>
            <div id="my-file-tag"></div>
        </div>

        <!-- P0a: Deadline Countdown -->
        <div class="cmp-section" id="deadline-section" style="border-left:3px solid #f0883e;display:none;">
            <label class="cmp-label" style="color:#f0883e;font-weight:600;">⏰ <span data-i18n="oar.deadlineTitle"></span></label>
            <div style="display:flex;gap:12px;align-items:center;flex-wrap:wrap;">
                <span style="color:#8b949e;font-size:13px;" data-i18n="oar.deadlineLabel"></span>
                <input type="date" id="oa-date" style="background:#0d1117;border:1px solid #30363d;border-radius:6px;color:#c9d1d9;padding:6px 10px;font-size:13px;">
                <span id="deadline-info" style="color:#8b949e;font-size:13px;"></span>
            </div>
        </div>

        <!-- Office Action Text -->
        <div class="cmp-section" style="border-left:3px solid #f85149;">
            <label class="cmp-label" style="color:#f85149;font-weight:600;" data-i18n="oar.oaLabel"></label>
            <div class="my-input-row">
                <input type="text" id="oa-input" class="cmp-input" disabled data-i18n-placeholder="oar.oaPlaceholder" style="flex:1;">
                <button class="btn-upload" onclick="uploadOA()">📎 <span data-i18n="common.upload"></span></button>
                <button class="btn-paste" onclick="pasteOA()">📋 <span data-i18n="common.paste"></span></button>
            </div>
            <div id="oa-file-tag"></div>
        </div>

        <!-- Reference Documents -->
        <div class="cmp-section cmp-ref">
            <label class="cmp-label" style="color:#58a6ff;font-weight:600;" data-i18n="oar.refLabel"></label>
            <div id="ref-list">
                <div class="ref-row" data-idx="0">
                    <input type="text" class="cmp-input ref-input" data-i18n-placeholder="oar.refPlaceholder">
                    <button class="btn-upload" onclick="uploadRef(this)">📎 <span data-i18n="common.upload"></span></button>
                    <button class="btn-paste" onclick="pasteRef(this)">📋 <span data-i18n="common.paste"></span></button>
                    <button class="btn-add" onclick="lookupRef(this)">🔍 <span data-i18n="oar.lookup"></span></button>
                    <button class="btn-remove" onclick="removeRef(this)" title="移除">&times;</button>
                </div>
            </div>
            <button class="btn-add" onclick="addRef()" id="btn-add-ref">+ <span data-i18n="oar.addRef"></span></button>
        </div>

        <!-- Depth Selector + Action Buttons -->
        <div class="btn-row">
            <button class="btn-primary" id="btn-analyze" onclick="doOAAnalysis()" data-i18n="oar.btnAnalyze"></button>
            <button class="btn-secondary" onclick="showOADiscussImportDialog()" style="margin-left:8px;" data-i18n="oar.discussImport">📥 导入讨论</button>
            <div style="display:flex;align-items:center;gap:8px;margin-left:auto;">
                <span style="color:#8b949e;font-size:13px;" data-i18n="oar.depthLabel"></span>
                <select id="depth-select" style="background:#21262d;color:#c9d1d9;border:1px solid #30363d;border-radius:6px;padding:6px 10px;font-size:13px;">
                    <option value="shallow" data-i18n="oar.depthShallow"></option>
                    <option value="medium" selected data-i18n="oar.depthMedium"></option>
                    <option value="deep" data-i18n="oar.depthDeep"></option>
                </select>
            </div>
        </div>

        <div id="result"></div>

        <!-- AI Discussion Panel -->
        <div class="discussion-panel hidden" id="discussion-panel">
            <div class="discussion-header" data-i18n="oar.discussTitle"></div>
            <!-- 论点看板 / Argument Board -->
            <div id="arg-board" style="display:none;margin-bottom:12px;padding:12px;background:#0d1117;border:1px solid #30363d;border-radius:8px;">
                <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
                    <span style="color:#58a6ff;font-weight:600;font-size:13px;">📋 <span data-i18n="oar.argTitle"></span></span>
                    <span style="color:#8b949e;font-size:11px;cursor:pointer;" onclick="extractArgConclusions()" id="btn-extract-args">📝 <span data-i18n="oar.extractArgs"></span></span>
                </div>
                <div id="arg-list" style="display:flex;flex-direction:column;gap:6px;"></div>
            </div>
            <div class="discussion-messages" id="discussion-messages"></div>
            <div class="discussion-input-row">
                <input type="text" id="discussion-input" data-i18n-placeholder="oar.discussInput" onkeydown="if(event.key==='Enter') sendDiscussionMessage()">
                <button id="discussion-send-btn" onclick="sendDiscussionMessage()" data-i18n="oar.send"></button>
                <button id="discussion-stop-btn" onclick="stopDiscussionGeneration()" style="display:none;padding:8px 10px;background:#21262d;color:#f85149;border:1px solid #f85149;border-radius:6px;cursor:pointer;font-size:13px;white-space:nowrap;" data-i18n="oar.stop"></button>
                <button id="discussion-export-btn" onclick="exportDiscussionConclusions()" style="display:none;padding:8px 10px;background:#21262d;color:#c9d1d9;border:1px solid #6e7681;border-radius:6px;cursor:pointer;font-size:13px;white-space:nowrap;" data-i18n="oar.exportConclusions"></button>
                <button id="discussion-transcript-export-btn" onclick="exportDiscussionTranscript()" style="display:none;padding:8px 10px;background:#21262d;color:#c9d1d9;border:1px solid #6e7681;border-radius:6px;cursor:pointer;font-size:13px;white-space:nowrap;" data-i18n="oar.exportTranscript"></button>
            </div>
        </div>

        <!-- P2: Claim Amendment Assistant -->
        <div class="cmp-section" id="amendment-section" style="display:none;border-left:3px solid #3fb950;">
            <label class="cmp-label" style="color:#3fb950;font-weight:600;">✏️ <span data-i18n="oar.amendTitle"></span></label>
            <div style="margin-bottom:8px;">
                <textarea id="claims-editor" style="width:100%;min-height:120px;background:#0d1117;border:1px solid #30363d;border-radius:6px;color:#c9d1d9;padding:10px;font-size:13px;font-family:monospace;resize:vertical;"></textarea>
            </div>
            <div class="btn-row">
                <button class="btn-add" onclick="checkAmendments()" id="btn-check-amendments">🔍 <span data-i18n="oar.checkAmendments"></span></button>
                <button class="btn-add" onclick="showClaimDiff()" style="border-color:#3fb950;color:#3fb950;">📊 <span data-i18n="oar.showDiff"></span></button>
                <span style="color:#8b949e;font-size:12px;" data-i18n="oar.amendHint"></span>
            </div>
            <div id="amendment-result"></div>
        </div>

        <!-- P3: Argument Library -->
        <div class="cmp-section" id="lib-section" style="border-left:3px solid #d29922;">
            <label class="cmp-label" style="color:#d29922;font-weight:600;cursor:pointer;" onclick="toggleArgLib()">📚 <span data-i18n="oar.libTitle"></span> <span id="lib-toggle" style="font-size:12px;">▼</span></label>
            <div id="lib-content" style="margin-top:8px;font-size:13px;color:#c9d1d9;line-height:1.8;"></div>
        </div>

        <!-- P4: Checklist -->
        <div class="cmp-section" id="checklist-section" style="display:none;border-left:3px solid #58a6ff;">
            <label class="cmp-label" style="color:#58a6ff;font-weight:600;">✅ <span data-i18n="oar.checklistTitle"></span></label>
            <div id="checklist-content" style="font-size:13px;color:#c9d1d9;"></div>
        </div>

        <!-- P1a: Mapping Matrix -->
        <div class="cmp-section" id="matrix-section" style="display:none;border-left:3px solid #d2a8ff;">
            <label class="cmp-label" style="color:#d2a8ff;font-weight:600;">📊 <span data-i18n="oar.matrixTitle"></span></label>
            <div id="matrix-content" style="font-size:13px;color:#c9d1d9;overflow-x:auto;"></div>
        </div>
    </main>
    <aside id="page-sidebar" class="page-sidebar"></aside>
    </div>

    <!-- Paste Text Modal -->
    <div class="paste-modal-overlay" id="paste-modal">
        <div class="paste-modal">
            <h3 id="paste-modal-title" data-i18n="oar.pasteTitle"></h3>
            <input type="text" class="paste-title-input" id="paste-title" data-i18n-placeholder="oar.pasteTitlePlaceholder">
            <textarea id="paste-content" data-i18n-placeholder="oar.pasteContentPlaceholder"></textarea>
            <div class="modal-btns">
                <button class="btn-modal-cancel" onclick="closePasteModal()" data-i18n="common.cancel"></button>
                <button class="btn-modal-ok" onclick="confirmPaste()" data-i18n="common.confirm"></button>
            </div>
        </div>
    </div>

    <!-- PDF Preview Modal -->
    <div class="pdf-modal-overlay" id="pdf-preview-modal">
        <div class="pdf-modal">
            <button class="pdf-modal-close" onclick="closePdfPreview()">&times;</button>
            <iframe id="pdf-preview-iframe" src="about:blank"></iframe>
        </div>
    </div>

    <script src="/static/i18n.js"></script>
    <script>
    // Ensure DOMPurify never throws even if script failed to load
    if (typeof DOMPurify === 'undefined' || typeof DOMPurify.sanitize !== 'function') {
        window.DOMPurify = { sanitize: function(html) {
            return html.replace(/<script\b[^<]*(?:(?!<\/script>)<[^<]*)*<\/script>/gi, '')
                       .replace(/on\w+="[^"]*"/gi, '').replace(/on\w+='[^']*'/gi, '');
        }};
    }

    // ── PDF Preview ──
    var uploadedFileObjects = {};

    function showPdfPreview(url) {
        document.getElementById('pdf-preview-iframe').src = url;
        document.getElementById('pdf-preview-modal').classList.add('show');
    }

    function closePdfPreview() {
        document.getElementById('pdf-preview-modal').classList.remove('show');
        document.getElementById('pdf-preview-iframe').src = 'about:blank';
    }

    document.getElementById('pdf-preview-modal').addEventListener('click', function(e) {
        if (e.target === this) closePdfPreview();
    });

    async function uploadAndPreviewPdf(file) {
        var form = new FormData();
        form.append('file', file);
        try {
            var resp = await fetch('/api/upload/pdf-store', { method: 'POST', body: form });
            if (!resp.ok) throw new Error('upload failed (' + resp.status + ')');
            var data = await resp.json();
            if (data.status === 'ok' && data.url) {
                showPdfPreview(data.url);
            } else {
                alert(data.message || 'PDF store failed');
            }
        } catch (e) {
            alert('PDF preview failed: ' + e.message);
        }
    }

    function previewPdfByKey(key) {
        var file = uploadedFileObjects[key];
        if (file) uploadAndPreviewPdf(file);
    }

    // ── State (persisted to sessionStorage, survives page refresh) ──
    var OA_STORAGE_KEY = 'innoforge_oa_data';
    var uploadedData = {};
    var refIdxCounter = 0;
    var lastAnalysisRawText = '';
    var discussionHistory = [];
    var discussionAbortController = null;
    var discussionSending = false;

    function saveOaState() {
        try { localStorage.setItem(OA_STORAGE_KEY, JSON.stringify(_uploadedData)); } catch (e) { /* ignore */ }
    }
    // uploadedData 用 Proxy 包装，任何修改自动持久化到 localStorage（关页面不丢）
    var _uploadedData = {};
    try { if (localStorage.getItem('innoforge_oa_data')) { _uploadedData = JSON.parse(localStorage.getItem('innoforge_oa_data')); } } catch (e) { _uploadedData = {}; }
    // Proxy 仅拦截 set/delete 触发自动保存；get/遍历等操作直接转发到 target
    var uploadedData = new Proxy(_uploadedData, {
        set: function(target, key, value) { target[key] = value; saveOaState(); return true; },
        deleteProperty: function(target, key) { delete target[key]; saveOaState(); return true; },
    });

    function loadOaState() {
        try {
            var saved = localStorage.getItem(OA_STORAGE_KEY);
            if (saved) {
                var data = JSON.parse(saved);

    function escapeHtml(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

    function getPatentNumberFromUrl() {
        // 优先从 URL 参数读取
        var params = new URLSearchParams(window.location.search);
        var pn = params.get('patent_id');
        if (pn) return pn;
        // 其次从页面 DOM 读取（专利详情页跳转过来时会有 patent-number 元素）
        var el = document.getElementById('patent-number-value');
        if (el && el.textContent) return el.textContent.trim();
        // 最后从 localStorage 读取（OA 页面上保存的专利号）
        if (typeof uploadedData !== 'undefined' && uploadedData['patent_number']) return uploadedData['patent_number'];
        // 从 localStorage OA 数据中读取
        try {
            var oaData = JSON.parse(localStorage.getItem('innoforge_oa_data') || '{}');
            if (oaData['my']) {
                var title = oaData['my'].title || '';
                // 从标题中提取专利号（格式："CN1234567 — 标题"）
                var parts = title.split('—');
                if (parts.length > 0) return parts[0].trim();
            }
        } catch (e) {}
        // 从 OA 文件标题中提取专利号（格式："王青芝 2022104773249 二审.pdf"）
        if (typeof uploadedData !== 'undefined' && uploadedData['oa']) {
            var oaTitle = uploadedData['oa'].title || '';
            var numMatch = oaTitle.match(/\b\d{10,}\b/);
            if (numMatch) return numMatch[0];
        }
        // 从本申请输入框读取
        var myInput = document.getElementById('my-patent');
        if (myInput && myInput.value.trim().length > 3) return myInput.value.trim();
        return '';
    }

    async function doPatentLookup(patentNumber, onSuccess) {
        // 先查本地（免费）
        try {
            var resp = await fetch('/api/patent/lookup/' + encodeURIComponent(patentNumber));
            var data = await resp.json();
            if (data.status === 'ok' && data.patent) { onSuccess(data.patent); return; }
        } catch (e) {}
        // 本地没有 → 让用户选择是否在线抓取（消耗 API 额度）
        if (!confirm('本地库中未找到该专利。\n是否从在线数据库抓取？（将消耗 API 查询额度）\n\n点「取消」可改为上传 PDF 文件。')) return;
        try {
            var resp = await fetch('/api/patent/lookup-or-fetch', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({patent_number: patentNumber})
            });
            var data = await resp.json();
            if (data.status === 'ok' && data.patent) { onSuccess(data.patent); return; }
            alert(data.message || t('oar.lookupFail'));
        } catch (e) { alert(t('oar.lookupFail') + ': ' + e.message); }
    }

    // Auto-detect patent number + OA date from OA text
    function autoDetectPatentFromOA(oaText) {
        if (!oaText) return;
        // --- Patent number ---
        var patterns = [
            /CN\s*(\d{7,13}(?:\.\d)?)/i,
            /ZL\s*(\d{7,13}(?:\.\d)?)/i,
            /申请号[：:]\s*(\d{7,13}(?:\.\d)?)/,
            /专利号[：:]\s*(\d{7,13}(?:\.\d)?)/,
            /(\d{13}(?:\.\d)?)/,
        ];
        var patentNum = null;
        for (var i = 0; i < patterns.length; i++) {
            var m = oaText.match(patterns[i]);
            if (m && m[1]) { patentNum = m[1].replace(/\s/g, ''); break; }
        }
        if (patentNum && patentNum.length >= 9) {
            var existing = document.getElementById('my-patent').value.trim();
            if (!existing || existing.length <= 5) {
                document.getElementById('my-patent').value = patentNum;
                lookupMyPatent();
            }
        }

        // --- OA date ---
        var datePatterns = [
            /发文日[：:]\s*(\d{4})\s*[年\-]\s*(\d{1,2})\s*[月\-]\s*(\d{1,2})\s*日?/,
            /(\d{4})\s*[年\-]\s*(\d{1,2})\s*[月\-]\s*(\d{1,2})\s*日?/,
            /(\d{4})-(\d{1,2})-(\d{1,2})/,
        ];
        for (var j = 0; j < datePatterns.length; j++) {
            var dm = oaText.match(datePatterns[j]);
            if (dm && dm[1]) {
                var year = dm[1];
                var month = dm[2].padStart(2, '0');
                var day = dm[3].padStart(2, '0');
                var dateStr = year + '-' + month + '-' + day;
                var oaDateInput = document.getElementById('oa-date');
                if (oaDateInput && !oaDateInput.value) {
                    oaDateInput.value = dateStr;
                    oaDateInput.dispatchEvent(new Event('change'));
                }
                break;
            }
        }
    }

    // ── Markdown Renderer ──
    function renderMarkdown(text) {
        if (!text) return '';
        var codeBlocks = [];
        text = text.replace(/```(\w*)\n?([\s\S]*?)```/g, function(_, lang, code) {
            codeBlocks.push('<pre style="background:#0d1117;border:1px solid #30363d;border-radius:6px;padding:10px;overflow-x:auto;font-size:0.85em;"><code>' + escapeHtml(code) + '</code></pre>');
            return '\x00CB' + (codeBlocks.length - 1) + '\x00';
        });
        var tableBlocks = [];
        // Match standard markdown tables: header | sep | body
        text = text.replace(/(?:^|\n)(\|.+\|)\n(\|[\s:|-]+\|)\n((?:\|.+\|\n?)+)/gm, function(_, header, sep, body) {
            var ths = header.split('|').filter(function(c) { return c.trim() !== ''; });
            var rows = body.trim().split('\n');
            var html = '<div class="oa-table-scroll"><table><thead><tr>';
            for (var i = 0; i < ths.length; i++) html += '<th style="background:#21262d;color:#c9d1d9;padding:8px 10px;border:1px solid #30363d;">' + escapeHtml(ths[i].trim()) + '</th>';
            html += '</tr></thead><tbody>';
            for (var r = 0; r < rows.length; r++) {
                var cells = rows[r].split('|').filter(function(c) { return c.trim() !== ''; });
                html += '<tr>';
                for (var c = 0; c < cells.length; c++) html += '<td style="padding:8px 10px;border:1px solid #30363d;">' + escapeHtml(cells[c].trim()).replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>') + '</td>';
                html += '</tr>';
            }
            html += '</tbody></table></div>';
            tableBlocks.push(html);
            return '\n\x00TB' + (tableBlocks.length - 1) + '\x00\n';
        });
        // Match tables without separator row (>=2 pipe-delimited lines, each starts with |)
        text = text.replace(/(?:^|\n)((?:\|.+\|\n?){2,})/gm, function(_, block) {
            var lines = block.trim().split('\n').filter(function(l) { return l.trim().startsWith('|'); });
            if (lines.length < 2) return _; // need at least header + 1 row
            // Check if any line looks like a separator (mostly dashes between pipes)
            var dataLines = lines.filter(function(l) { return !/^\|[\s:|-]+\|$/.test(l.trim()); });
            if (dataLines.length < 2) return _; // after removing separators, need at least header + 1 row
            var ths = dataLines[0].split('|').filter(function(c) { return c.trim() !== ''; });
            var html = '<div class="oa-table-scroll"><table><thead><tr>';
            for (var i = 0; i < ths.length; i++) html += '<th style="background:#21262d;color:#c9d1d9;padding:8px 10px;border:1px solid #30363d;">' + escapeHtml(ths[i].trim()) + '</th>';
            html += '</tr></thead><tbody>';
            for (var r = 1; r < dataLines.length; r++) {
                var cells = dataLines[r].split('|').filter(function(c) { return c.trim() !== ''; });
                html += '<tr>';
                for (var c = 0; c < cells.length; c++) html += '<td style="padding:8px 10px;border:1px solid #30363d;">' + escapeHtml(cells[c].trim()).replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>') + '</td>';
                html += '</tr>';
            }
            html += '</tbody></table></div>';
            tableBlocks.push(html);
            return '\n\x00TB' + (tableBlocks.length - 1) + '\x00\n';
        });
        var result = escapeHtml(text)
            .replace(/^#### (.+)$/gm, '<h4>$1</h4>')
            .replace(/^### (.+)$/gm, '<h3>$1</h3>')
            .replace(/^## (.+)$/gm, '<h2>$1</h2>')
            .replace(/`([^`]+)`/g, '<code style="background:#21262d;padding:1px 5px;border-radius:3px;font-size:0.9em;">$1</code>')
            .replace(/\*\*(.+?)\*\*/g, '<strong style="color:#f0883e;">$1</strong>')
            .replace(/^\- (.+)$/gm, '<li>$1</li>')
            .replace(/^(\d+)\. (.+)$/gm, '<li>$2</li>')
            .replace(/(<li>.*<\/li>)/g, '<ul>$1</ul>')
            .replace(/<\/ul>\s*<ul>/g, '')
            .replace(/\n{2,}/g, '</p><p>')
            .replace(/\n/g, '<br>');
        result = result.replace(/\x00CB(\d+)\x00/g, function(_, i) { return codeBlocks[parseInt(i)]; });
        result = result.replace(/\x00TB(\d+)\x00/g, function(_, i) { return tableBlocks[parseInt(i)]; });
        return result;
    }

    // ── Main OA Analysis (SSE streaming with fallback) ──
    async function doOAAnalysis() {
        var my = getMyPatent();
        var oa = getOA();
        var refs = getRefs();
        var oaType = document.querySelector('input[name="oa_type"]:checked').value;
        var depth = document.getElementById('depth-select').value;

        var typeLabel = document.querySelector('input[name="oa_type"]:checked + span');
        var typeName = typeLabel ? typeLabel.textContent : oaType;

        var body = { references: refs, office_action: oa, oa_type: oaType, depth: depth, discuss: true };
        if (typeof my === 'string') {
            body.my_patent_id = my;
        } else {
            body.my_patent = my;
            // Extract patent number from uploaded content for auto-save (e.g. CN202310123456)
            var content = my.content || my.title || '';
            var pn = content.match(/\b((?:CN|US|EP|JP|KR|WO)\d{7,12}(?:[.]?\d)?)\b/i);
            if (pn) body.my_patent_id = pn[1];
        }

        // Show streaming-friendly UI
        var container = document.getElementById('result');
        var btn = document.getElementById('btn-analyze');
        if (btn) btn.disabled = true;
        container.innerHTML = '<div class="result-box" style="border-color:#30363d;"><div class="result-content" id="streaming-result" style="padding:16px;font-size:13px;line-height:1.8;color:#c9d1d9;white-space:pre-wrap;word-break:break-word;max-height:70vh;overflow-y:auto;font-family:Consolas,monospace;"></div></div>';

        // Try non-streaming POST first (DeepSeek 流式返回内容不同)
        try {
            var resp2 = await fetch('/api/ai/office-action-response', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(body)
            });
            var data2 = await resp2.json();
            if (data2.error) throw new Error(data2.error);
            lastAnalysisRawText = data2.analysis || '';
            // Keep every successful analysis path in discussion mode so the
            // response-letter action is always visible after analysis.
            showOAAnalysisDiscuss(data2.analysis);

            numberRefParagraphs();
            extractMappingMatrix(data2.analysis);

            var content2 = (uploadedData['my'] && uploadedData['my'].content) || document.getElementById('my-patent').value || '';
            if (content2) showAmendmentEditor(content2);
            showChecklist();
            loadOaHistory();
        } catch (e) {
            // Fallback: try SSE streaming
            console.warn('Non-streaming POST failed, falling back to SSE streaming:', e.message);
            try {
            var resp = await fetch('/api/ai/office-action-response/stream', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(body)
            });
            if (!resp.ok) throw new Error('HTTP ' + resp.status);
            if (!resp.body) throw new Error('No ReadableStream support');

            var reader = resp.body.getReader();
            var decoder = new TextDecoder();
            var buffer = '';
            var fullText = '';
            var currentEvent = '';
            var streamDiv = document.getElementById('streaming-result');
            var done = false;
            var errored = false;

            while (true) {
                var { done: streamDone, value } = await reader.read();
                if (streamDone) break;

                buffer += decoder.decode(value, { stream: true });

                // Parse SSE events
                var lines = buffer.split('\n');
                buffer = lines.pop(); // Keep incomplete line

                for (var i = 0; i < lines.length; i++) {
                    var line = lines[i];
                    if (line.startsWith('event: ')) {
                        currentEvent = line.slice(7).trim();
                    } else if (line.startsWith('data:')) {
                        var data = line.slice(5).replace(/^ /, '');
                        if (currentEvent === 'error' || data.startsWith('[ERROR]')) {
                            showError(data.replace('[ERROR] ', ''));
                            errored = true;
                            done = true;
                            break;
                        }
                        if (currentEvent === 'done' || data === '[DONE]') {
                            done = true;
                            break;
                        }
                        // Regular text chunk
                        fullText += data;
                        if (streamDiv) {
                            streamDiv.textContent = fullText;
                            streamDiv.scrollTop = streamDiv.scrollHeight;
                        }
                    } else if (line === '' && currentEvent) {
                        // Empty line = end of event; reset for next event
                        currentEvent = '';
                    }
                }
                if (done) break;
            }

            if (!errored && fullText.length > 0) {
                lastAnalysisRawText = fullText;
                // Discuss mode: show sections 1-4 + discussion panel + generate button
                showOAAnalysisDiscuss(fullText);

                // 映射矩阵 + 锚点
                numberRefParagraphs();
                extractMappingMatrix(fullText);

                // 显示权利要求修改助手和检查清单
                var content = (uploadedData['my'] && uploadedData['my'].content) || document.getElementById('my-patent').value || '';
                if (content) showAmendmentEditor(content);
                showChecklist();
                // 刷新历史列表
                loadOaHistory();
            } else if (!errored) {
                showError(t('oar.fail'));
            }
        } catch (e) {
            // Fallback: try non-streaming endpoint
            console.warn('SSE streaming failed, falling back to regular POST:', e.message);
            try {
                var resp2 = await fetch('/api/ai/office-action-response', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(body)
                });
                var data2 = await resp2.json();
                if (data2.error) { showError(data2.error); return; }
                lastAnalysisRawText = data2.analysis || '';
                // 统一走 Discuss 模式：显示分析结果 + 讨论区 + 生成按钮（不再无按钮）
                showOAAnalysisDiscuss(data2.analysis);

                numberRefParagraphs();
                extractMappingMatrix(data2.analysis);

                var content2 = (uploadedData['my'] && uploadedData['my'].content) || document.getElementById('my-patent').value || '';
                if (content2) showAmendmentEditor(content2);
                showChecklist();
                loadOaHistory();
            } catch (e2) {
                showError(t('oar.fail') + ': ' + e2.message);
            }
        }
    }
    }

    // ── New: Parse OA analysis into sections ──
    function parseOASections(text) {
        if (!text) return [];
        var sectionMarkers = [
            { key: 'part1', label: t('oar.section1'), color: '#58a6ff', patterns: ['=== 第一部分', '## 第一部分', '一、审查意见概述'] },
            { key: 'part2', label: t('oar.section2'), color: '#d29922', patterns: ['=== 第二部分', '## 第二部分'] },
            { key: 'part3', label: t('oar.section3'), color: '#3fb950', patterns: ['=== 第三部分', '## 第三部分', '特征对比表', '特征对比总表'] },
            { key: 'part4', label: t('oar.section4'), color: '#d2a8ff', patterns: ['=== 第四部分', '## 第四部分', '分层反驳', '逐权利要求反驳'] },
            { key: 'part5', label: t('oar.section5'), color: '#f0883e', patterns: ['=== 第五部分', '## 第五部分', '意见陈述书草稿', '意见陈述书', '=== 第五部分'] },
        ];
        var sections = [];
        var remaining = text;

        for (var i = 0; i < sectionMarkers.length; i++) {
            var marker = sectionMarkers[i];
            var startIdx = -1;
            // Find the first matching pattern
            for (var p = 0; p < marker.patterns.length; p++) {
                var idx = remaining.indexOf(marker.patterns[p]);
                if (idx >= 0) { startIdx = idx; break; }
            }
            if (startIdx < 0) continue;

            // Find where this section ends (next marker or end of string)
            var endIdx = remaining.length;
            for (var j = i + 1; j < sectionMarkers.length; j++) {
                for (var p = 0; p < sectionMarkers[j].patterns.length; p++) {
                    var nextIdx = remaining.indexOf(sectionMarkers[j].patterns[p], startIdx + 1);
                    if (nextIdx >= 0 && nextIdx < endIdx) { endIdx = nextIdx; break; }
                }
            }
            var sectionText = remaining.substring(startIdx, endIdx).trim();
            if (sectionText) {
                sections.push({
                    key: marker.key,
                    label: marker.label,
                    color: marker.color,
                    text: sectionText
                });
            }
        }

        return sections;
    }

            var lastUserMsg = document.querySelector('#oa-discuss-messages .msg-bubble:last-of-type');
            if (pendingFile.type && pendingFile.type.startsWith('image/')) {
                if (lastUserMsg) {
                    var img = document.createElement('img');
                    img.src = pendingFile.dataUrl;
                    img.style.cssText = 'max-width:300px;max-height:200px;border-radius:6px;margin-top:8px;display:block;';
                    lastUserMsg.appendChild(img);
                }
            } else {
                if (lastUserMsg) {
                    var fileNote = document.createElement('div');
                    fileNote.style.cssText = 'color:#58a6ff;font-size:12px;margin-top:4px;';
                    fileNote.textContent = '📎 ' + pendingFile.name;
                    lastUserMsg.appendChild(fileNote);
                }
            }
            window._oaDiscussPendingFile = null;
        }

        try {
            var payload = {
                analysis: lastAnalysisRawText,
                discussion: JSON.stringify(oaDiscussMessages.slice(0, -1)),
                message: msg,
                office_action: oaDiscussOAText,
                oa_text: oaDiscussOAText
            };
            // 传入 OA 类型增强上下文
            if (oaDiscussOAType) payload.oa_type = oaDiscussOAType;
            // 传入专利号和讨论 ID
            if (patentNum) payload.patent_number = patentNum;
            if (applicantNm) payload.applicant_name = applicantNm;
            payload.discussion_id = discussionId;
            // 如果有上传的文件，把 base64 内容传给 AI
            var pf = window._oaDiscussPendingFile;
            if (pf && pf.base64) {
                payload.file_name = pf.name;
                payload.file_base64 = pf.base64;
                payload.file_type = pf.type;
                // 清空待发送文件
                window._oaDiscussPendingFile = null;
            }

            var resp = await fetch('/api/ai/oa-discuss', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            if (!resp.ok) throw new Error('HTTP ' + resp.status);
            if (!resp.body) throw new Error('No streaming support');

            var reader = resp.body.getReader();
            var decoder = new TextDecoder();
            var buffer = '';
            var aiText = '';
            var done = false;
            var currentEvent = '';
            var capturedDiscId = discussionId;

            while (true) {
                var { done: sd, value } = await reader.read();
                if (sd) break;
                buffer += decoder.decode(value, { stream: true });
                var lines = buffer.split('\n');
                buffer = lines.pop();
                for (var i = 0; i < lines.length; i++) {
                    var line = lines[i];
                    if (line.startsWith('event: ')) {
                        currentEvent = line.slice(7).trim();
                    } else if (line.startsWith('data:')) {
                        var data = line.slice(5).replace(/^ /, '');
                        if (currentEvent === 'error' || data.startsWith('[ERROR]')) {
                            aiText = '⚠️ ' + data.replace('[ERROR] ', '');
                            done = true;
                            break;
                        }
                        if (currentEvent === 'done' || data === '[DONE]') {
                            // 从 done 事件中提取后端生成的 discussion_id
                            try {
                                var doneObj = JSON.parse(data);
                                if (doneObj && doneObj.discussion_id) {
                                    capturedDiscId = doneObj.discussion_id;
                                    localStorage.setItem('oa-discuss-id', capturedDiscId);
                                }
                            } catch (_) { /* 忽略解析错误 */ }
                            done = true;
                            break;
                        }
                        aiText += data;
                        if (aiDiv) aiDiv.innerHTML = renderMarkdown(aiText) + '<span style="color:#f0883e;">▌</span>';
                    } else if (line === '' && currentEvent) {
                        currentEvent = '';
                    }
                }
                if (done) break;
            }

            oaDiscussMessages.push({ role: 'assistant', content: aiText, timestamp: new Date().toISOString() });
            if (aiDiv) aiDiv.innerHTML = renderMarkdown(aiText);
            // 同步更新 discussionHistory（用于导出）
            if (typeof discussionHistory !== 'undefined') {
                discussionHistory.push(['assistant', aiText, new Date().toISOString()]);
            }
            updateCurrentOADiscussionExportButton();
            // 持久化完整讨论记录到 localStorage
            var history = {
                discussion_id: capturedDiscId,
                patent_number: patentNum,
                messages: JSON.stringify(oaDiscussMessages),
                oa_text: oaDiscussOAText || '',
                oa_type: oaDiscussOAType || ''
            };
            if (lsKeyPatent) localStorage.setItem(lsKeyPatent, JSON.stringify(history));
        } catch (e) {
            if (aiDiv) aiDiv.innerHTML = '<span style="color:#f85149;">讨论失败: ' + escapeHtml(e.message) + '</span>';
        }
        input.disabled = false;
        input.focus();
    }

    async function generateResponseLetter() {
        var btn = document.getElementById('btn-generate-response');
        if (btn) { btn.disabled = true; btn.textContent = '⏳ ' + (t('oar.generating') || '生成中...'); }

        var section5Area = document.getElementById('section5-content');

                + '<div id="overlay-stream" style="color:#c9d1d9;font-family:Consolas,monospace;font-size:14px;white-space:pre-wrap;line-height:1.7;"></div>'
                + '</div>';
            overlayDiv.className = 'oa-response-overlay';
            document.body.appendChild(overlayDiv);
        }

        try {
            var resp = await fetch('/api/ai/oa-generate-response-letter', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    analysis: lastAnalysisRawText,
                    discussion: JSON.stringify(oaDiscussMessages),
                    office_action: oaDiscussOAText,
                    oa_type: oaDiscussOAType,
                    discussion_id: localStorage.getItem('oa-discuss-id') || ''
                })
            });

            if (!resp.ok) throw new Error('HTTP ' + resp.status);
            if (!resp.body) throw new Error('No streaming support');

            var reader = resp.body.getReader();
            var decoder = new TextDecoder();
            var buffer = '';
            var fullText = '';
            var done = false;
            var streamDiv = document.getElementById('section5-stream') || document.getElementById('overlay-stream');

            while (true) {
                var { done: sd, value } = await reader.read();
                if (sd) break;
                buffer += decoder.decode(value, { stream: true });
                var lines = buffer.split('\n');
                buffer = lines.pop();
                for (var i = 0; i < lines.length; i++) {
                    var line = lines[i];
                    if (line.startsWith('data:')) {
                        var data = line.slice(5).replace(/^ /, '');
                        if (data.startsWith('[ERROR]')) {
                            if (section5Area) section5Area.innerHTML = '<div style="color:#f85149;padding:16px;">' + escapeHtml(data) + '</div>';
                            if (overlayDiv) { overlayDiv.querySelector('h3').textContent = '❌ 生成失败'; overlayDiv.querySelector('#overlay-stream').textContent = data; }
                            if (btn) { btn.disabled = false; btn.textContent = '📝 ' + (t('oar.btnGenerateResponse') || '生成意见陈述书'); }
                            return;
                        }
                        if (data === '[DONE]') { done = true; break; }
                        fullText += data.replace(/\\n/g, '\n');
                        if (streamDiv) {
                            streamDiv.textContent = fullText;
                            if (overlayDiv) { overlayDiv.scrollTop = overlayDiv.scrollHeight; }
                        }
                    }
                }
                if (done) break;
            }

            // A response made only of Markdown or decorative characters becomes
            // blank after DOCX cleanup. Keep it out of the export path and tell
            // the user to correct the OCR source instead of exporting a blank file.
            var meaningfulChars = (fullText.match(/[\u3400-\u9fffa-zA-Z0-9]/g) || []).length;
            if (meaningfulChars < 80) {
                var qualityError = t('oar.generationQualityError') || '未生成可用的答复书正文。请检查 OA 原文是否可读，必要时粘贴或修正 OA 全文后重试。';

                    overlayDiv.querySelector('h3').textContent = '生成内容不可用';

                }
                if (btn) { btn.disabled = false; btn.textContent = '📝 ' + (t('oar.btnGenerateResponse') || '生成意见陈述书'); }
                return;
            }

            // Store before rendering any action button, so export is immediately available.
            window._generatedResponseText = fullText;
            showPersistentResponseExportButton();

            // Update section 5 area with rendered markdown
            if (section5Area) {
                section5Area.innerHTML = '<div style="padding:12px 14px;font-size:13px;line-height:1.8;color:#c9d1d9;">' + renderMarkdown(fullText) + '</div>';
                // Add export button
                section5Area.innerHTML += '<div style="padding:8px 14px;border-top:1px solid #30363d;text-align:right;">' +
                    '<button onclick="exportGeneratedResponse(this)" style="background:#f0883e;color:#fff;border:none;border-radius:6px;padding:9px 18px;cursor:pointer;font-size:14px;font-weight:600;">📥 导出 Word 答复书</button></div>';
            } else if (overlayDiv) {
                overlayDiv.querySelector('h3').textContent = '✅ 答复书已生成';

                contentDiv.innerHTML = renderMarkdown(fullText);
                contentDiv.style.whiteSpace = 'normal';
                contentDiv.style.fontFamily = 'system-ui, sans-serif';
                contentDiv.style.fontSize = '14px';
                contentDiv.style.lineHeight = '1.8';
                var exportBtn = document.createElement('button');
                exportBtn.textContent = '📥 导出答复书';
                exportBtn.style.cssText = 'margin-top:20px;padding:10px 24px;background:#f0883e;color:#fff;border:none;border-radius:8px;font-size:14px;cursor:pointer;';
                exportBtn.onclick = function() { exportGeneratedResponse(exportBtn); };
                contentDiv.parentElement.appendChild(exportBtn);
            }

            // Update section 5 border to solid
            var s5 = document.getElementById('section5-area');
            if (s5) s5.style.border = '1px solid #f0883e44';

            if (btn) { btn.disabled = true; btn.textContent = '✅ ' + (t('oar.generated') || '已生成'); }
        } catch (e) {
            if (section5Area) section5Area.innerHTML = '<div style="color:#f85149;padding:16px;">生成失败: ' + escapeHtml(e.message) + '</div>';
            if (overlayDiv) { overlayDiv.querySelector('h3').textContent = '❌ 生成失败'; overlayDiv.querySelector('#overlay-stream').textContent = e.message; }
            if (btn) { btn.disabled = false; btn.textContent = '📝 ' + (t('oar.btnGenerateResponse') || '生成意见陈述书'); }
        }
    }

    function parseArgsFromAI(content) {
        // 从 AI 回复中提取可能的论点
        var lines = content.split('\n');
        var currentType = 'pending';
        for (var i = 0; i < lines.length; i++) {
            var line = lines[i].trim();
            if (!line) continue;
            // 检测类型标记
            if (line.indexOf('✅') >= 0 || line.indexOf('已确定') >= 0 || line.indexOf('论点') >= 0) currentType = 'confirmed';
            else if (line.indexOf('⚠️') >= 0 || line.indexOf('风险') >= 0 || line.indexOf('不足') >= 0) currentType = 'risk';
            else if (line.indexOf('📌') >= 0 || line.indexOf('建议') >= 0 || line.indexOf('待补充') >= 0) currentType = 'pending';
            // 提取论点内容（去掉标记符号）
            var clean = line.replace(/^[\s\-*✅⚠️📌📝\d.]+/, '').trim();
            if (clean.length > 10 && clean.indexOf('：') >= 0) {
                addArgCard(clean, currentType);
            } else if (clean.length > 15 && (line.indexOf('：') >= 0 || line.indexOf(':') >= 0 || line.indexOf('、') >= 0)) {
                addArgCard(clean, currentType);
            }
        }
    }

    // ── P0b: Claim Amendment Diff ──
    function computeLineDiff(oldLines, newLines) {
        // Simple LCS-based line diff
        var m = oldLines.length, n = newLines.length;
        var dp = Array(m + 1).fill(null).map(function() { return Array(n + 1).fill(0); });
        for (var i = 1; i <= m; i++) {
            for (var j = 1; j <= n; j++) {
                dp[i][j] = oldLines[i - 1] === newLines[j - 1] ? dp[i - 1][j - 1] + 1 : Math.max(dp[i - 1][j], dp[i][j - 1]);
            }
        }
        var result = [];
        var i = m, j = n;
        while (i > 0 || j > 0) {
            if (i > 0 && j > 0 && oldLines[i - 1] === newLines[j - 1]) {
                result.unshift({ type: 'same', text: oldLines[i - 1] });
                i--; j--;
            } else if (j > 0 && (i === 0 || dp[i][j - 1] >= dp[i - 1][j])) {
                result.unshift({ type: 'add', text: newLines[j - 1] });
                j--;
            } else {
                result.unshift({ type: 'remove', text: oldLines[i - 1] });
                i--;
            }
        }
        return result;
    }

    // ── P1a: Mapping Matrix ──
    function extractMappingMatrix(analysisText) {
        var section = document.getElementById('matrix-section');
        var content = document.getElementById('matrix-content');
        if (!section || !content || !analysisText) return;
        // Parse AI output for structured claim mapping
        var rows = [];
        var lines = analysisText.split('\n');
        var currentClaim = '', currentReason = '', currentArticle = '', currentRef = '';
        for (var i = 0; i < lines.length; i++) {
            var line = lines[i].trim();
            if (!line) continue;
            // Extract claim numbers
            var claimMatch = line.match(/权利要求\s*(\d+[\d,\s、\-]*\d*)/);
            if (claimMatch) currentClaim = claimMatch[1];
            // Extract rejection reason
            if (line.indexOf('新颖性') >= 0 || line.indexOf('创造性') >= 0 || line.indexOf('不支持') >= 0 || line.indexOf('不清楚') >= 0) {
                currentReason = line.indexOf('新颖性') >= 0 ? '缺乏新颖性' : line.indexOf('创造性') >= 0 ? '缺乏创造性' : line.indexOf('不支持') >= 0 ? '不支持' : '不清楚';
            }
            // Extract article
            var articleMatch = line.match(/A22\.\d|A25|A26\.\d|A33/);
            if (articleMatch) currentArticle = articleMatch[0];
            // Extract reference
            var refMatch = line.match(/对比文件\s*(\d+)|D\s*(\d+)/i);
            if (refMatch) {
                currentRef = 'D' + (refMatch[1] || refMatch[2]);
                rows.push({ claim: currentClaim || '-', reason: currentReason || '-', article: currentArticle || '-', ref: currentRef || '-' });
            } else if (currentClaim && currentReason && !currentRef) {
                rows.push({ claim: currentClaim, reason: currentReason, article: currentArticle || '-', ref: '-' });
                currentClaim = ''; currentReason = ''; currentArticle = ''; currentRef = '';
            }
        }
        if (rows.length === 0) return;
        section.style.display = '';
        var html = '<table style="width:100%;border-collapse:collapse;"><thead><tr>';
        html += '<th style="background:#21262d;color:#c9d1d9;padding:8px;border:1px solid #30363d;">权利要求</th>';
        html += '<th style="background:#21262d;color:#c9d1d9;padding:8px;border:1px solid #30363d;">驳回理由</th>';
        html += '<th style="background:#21262d;color:#c9d1d9;padding:8px;border:1px solid #30363d;">法条</th>';
        html += '<th style="background:#21262d;color:#c9d1d9;padding:8px;border:1px solid #30363d;">对比文件</th></tr><tbody>';
        for (var i = 0; i < rows.length; i++) {
            html += '<tr><td style="padding:8px;border:1px solid #30363d;color:#c9d1d9;">' + escapeHtml(rows[i].claim) + '</td>';
            html += '<td style="padding:8px;border:1px solid #30363d;color:#c9d1d9;">' + escapeHtml(rows[i].reason) + '</td>';
            html += '<td style="padding:8px;border:1px solid #30363d;color:#58a6ff;">' + escapeHtml(rows[i].article) + '</td>';
            html += '<td style="padding:8px;border:1px solid #30363d;color:#d29922;">' + escapeHtml(rows[i].ref) + '</td></tr>';
        }
        html += '</tbody></table>';
        content.innerHTML = DOMPurify.sanitize(html);
    }

                ctx += r.content + '\n';
            }
        }
        if (lastAnalysisRawText) {
            ctx += '\n== 当前分析结果 ==\n';
            ctx += lastAnalysisRawText + '\n';
        }
        discussionHistory = [['system', ctx, new Date().toISOString()]];
        var panel = document.getElementById('discussion-panel');
        panel.classList.remove('hidden');
        document.getElementById('discussion-messages').innerHTML =
            '<div class="msg msg-ai"><div class="msg-bubble">' + t('oar.discussHint') + '</div></div>';
        panel.scrollIntoView({ behavior: 'smooth', block: 'start' });
        document.getElementById('discussion-input').focus();
        showDiscussionExportButton();

    async function sendDiscussionMessage() {
        var input = document.getElementById('discussion-input');
        var text = input.value.trim();
        if (!text) return;
        if (discussionSending) {
            if (discussionAbortController) {
                discussionAbortController.abort();
                discussionAbortController = null;
            }
            var container = document.getElementById('discussion-messages');
            var last = container.lastChild;
            if (last && last.classList.contains('msg-ai') && last.id === 'ai-loading-disc') {
                container.removeChild(last);
            }
        }
        input.value = '';
        input.disabled = true;
        document.getElementById('discussion-send-btn').disabled = true;
        discussionSending = true;
        showDiscussionStopButton();

        // render user message
        var container = document.getElementById('discussion-messages');
        var userDiv = document.createElement('div');
        userDiv.className = 'msg msg-user';
        userDiv.innerHTML = '<div class="msg-bubble">' + escapeHtml(text) + '</div>';
        container.appendChild(userDiv);

        // loading indicator
        var loadDiv = document.createElement('div');
        loadDiv.className = 'msg msg-ai';
        loadDiv.id = 'ai-loading-disc';
        loadDiv.innerHTML = '<div class="msg-bubble">' + t('common.thinking') + '</div>';
        container.appendChild(loadDiv);
        container.scrollTop = container.scrollHeight;

        var controller = new AbortController();
        discussionAbortController = controller;
        var apiHistory = discussionHistory.map(function(h) { return [h[0], h[1]]; });

        // 专业代理师指令放在 user message 里（不放 system role，避开上游角色扮演审查）
        var proInstruction = '请以中国专利代理师视角回答：每处引用具体法条（A22.2新颖性/A22.3创造性/A26.3说明书支持/A33修改超范围），给修改方案时用"修改前→修改后"对比格式，区分"可克服"和"难克服"的缺陷并给出置信度。';
        var ctxParts = [];
        if (typeof oaDiscussOAText !== 'undefined' && oaDiscussOAText) ctxParts.push('【审查意见原文】\n' + oaDiscussOAText);
        if (typeof lastAnalysisRawText !== 'undefined' && lastAnalysisRawText) ctxParts.push('【当前OA分析结果】\n' + lastAnalysisRawText);
        ctxParts.push(proInstruction);
        ctxParts.push('我的问题：' + text);
        var messageWithContext = ctxParts.join('\n\n');

        try {
            // 用非流式接口 /api/ai/chat；不传 system_prompt，用后端默认 system 避开上游角色扮演审查
            var resp = await fetch('/api/ai/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    message: messageWithContext,
                    patent_id: null,
                    history: apiHistory,
                    web_search: false
                }),
                signal: controller.signal
            });

            var data = await resp.json();
            var loadEl = document.getElementById('ai-loading-disc');
            if (loadEl) loadEl.remove();

            // 兼容两种响应格式：{content: "..."} 或 {error: {...}}
            var content;
            if (data.error) {
                content = 'AI 调用失败：' + (data.error.message || JSON.stringify(data.error));
            } else {
                content = data.content || 'AI error: empty response';
            }

            discussionHistory.push(['user', text, new Date().toISOString()]);
            discussionHistory.push(['assistant', content, new Date().toISOString()]);
            parseArgsFromAI(content);

            var aiDiv = document.createElement('div');
            aiDiv.className = 'msg msg-ai';
            aiDiv.innerHTML = '<div class="msg-bubble">' + renderMarkdown(content) + '</div>';
            container.appendChild(aiDiv);
            container.scrollTop = container.scrollHeight;
            showDiscussionExportButton();
        } catch (e) {
            var loadEl = document.getElementById('ai-loading-disc');
            if (loadEl) loadEl.remove();
            if (e.name === 'AbortError') return;
            var errDiv = document.createElement('div');
            errDiv.className = 'msg msg-ai';
            errDiv.innerHTML = '<div class="msg-bubble" style="color:#f85149;">' + t('oar.fail') + ': ' + escapeHtml(e.message) + '</div>';
            container.appendChild(errDiv);
        } finally {
            if (discussionAbortController === controller) {
                discussionAbortController = null;
            }
            input.disabled = false;
            document.getElementById('discussion-send-btn').disabled = false;
            discussionSending = false;
            hideDiscussionStopButton();
            input.focus();
        }
    }

    function discussionTranscriptRoleLabel(role) {
        if (role === 'system') return t('oar.transcriptRoleSystem');
        if (role === 'assistant') return t('oar.transcriptRoleAssistant');
        return t('oar.transcriptRoleUser');
    }

    function discussionTranscriptCodeBlock(content) {
        var text = String(content == null ? '' : content);
        var backtickRuns = text.match(/`+/g) || [];
        var fenceLength = 3;
        for (var i = 0; i < backtickRuns.length; i++) {
            if (backtickRuns[i].length >= fenceLength) fenceLength = backtickRuns[i].length + 1;
        }
        var fence = '`'.repeat(fenceLength);
        return fence + 'text\n' + text + '\n' + fence;
    }

    function discussionTranscriptTime(entry) {
        return entry[2] || t('oar.transcriptTimeUnknown');
    }

    function buildDiscussionTranscript() {
        var exportedAt = new Date().toISOString();
        var systemEntry = discussionHistory[0] || ['system', '', ''];
        var lines = [
            '# ' + t('oar.transcriptTitle'),
            '',
            '> ' + t('oar.transcriptNotice'),
            '',
            '- ' + t('oar.transcriptGeneratedAt') + ': ' + exportedAt,
            '',
            '## ' + t('oar.transcriptContext'),
            '',
            '### ' + discussionTranscriptRoleLabel(systemEntry[0]),
            '- ' + t('oar.transcriptTime') + ': ' + discussionTranscriptTime(systemEntry),
            '',
            discussionTranscriptCodeBlock(systemEntry[1]),
            '',
            '## ' + t('oar.transcriptMessages')
        ];

        for (var i = 1; i < discussionHistory.length; i++) {
            var entry = discussionHistory[i];
            lines.push(
                '',
                '### ' + discussionTranscriptRoleLabel(entry[0]),
                '- ' + t('oar.transcriptTime') + ': ' + discussionTranscriptTime(entry),
                '',
                discussionTranscriptCodeBlock(entry[1])
            );
        }
        return lines.join('\n');
    }

    function exportDiscussionTranscript() {
        if (discussionHistory.length < 2) { hideDiscussionExportButton(); return; }
        var transcript = buildDiscussionTranscript();
        var blob = new Blob([transcript], { type: 'text/markdown;charset=utf-8' });
        var url = URL.createObjectURL(blob);
        var link = document.createElement('a');
        var filenameTime = new Date().toISOString().replace(/[:.]/g, '-');
        link.href = url;
        link.download = 'innoforge-oa-discussion-' + filenameTime + '.md';
        document.body.appendChild(link);
        link.click();
        link.remove();
        window.setTimeout(function() { URL.revokeObjectURL(url); }, 0);
    }

    // ── Discussion quote button event handlers ──
    function initDiscQuoteEvents() {
        // 同时绑定新旧两个讨论容器
        var containers = [
            document.getElementById('discussion-messages'),
            document.getElementById('oa-discuss-messages')
        ].filter(function(el) { return el; });

        containers.forEach(function(container) {
            container.addEventListener('mouseup', function(e) {
                var target = e.target;
                if (target && target.nodeType === 3) target = target.parentNode;
                if (target && target.closest && target.closest('.quote-btn')) return;
                setTimeout(function() {
                    var sel = window.getSelection();
                    var text = sel ? sel.toString().trim() : '';
                    if (!text) { hideDiscQuoteBtn(); return; }
                    var node = sel.anchorNode;
                    if (node) {
                        if (node.nodeType === 3) node = node.parentNode;
                        if (!node.closest('.msg-bubble')) { hideDiscQuoteBtn(); return; }
                    }
                    if (!sel.rangeCount) return;
                    var range = sel.getRangeAt(0);
                    var rect = range.getBoundingClientRect();
                    if (!rect || (rect.width === 0 && rect.height === 0)) { hideDiscQuoteBtn(); return; }
                    showDiscQuoteBtn(text, rect);
                }, 10);
            });
            container.addEventListener('scroll', function() { hideDiscQuoteBtn(); });
        });
        document.addEventListener('mousedown', function(e) {
            if (e.target && e.target.closest && e.target.closest('.quote-btn')) return;
            hideDiscQuoteBtn();
        });
    }

    async function recoverOADiscussion(discussionId) {
        if (!discussionId) return;
        var patentNum = getPatentNumberFromUrl();
        if (!patentNum) {
            alert('请先打开一个专利');
            return;
        }
        try {
            var resp = await fetch('/api/oa/discussions/' + encodeURIComponent(patentNum) + '/' + encodeURIComponent(discussionId));
            var data = await resp.json();
            if (!resp.ok || data.status !== 'ok') {
                alert('恢复讨论失败: ' + (data.error || '未知错误'));
                return;
            }
            var d = data.discussion || {};
            // discussion_history 是 JSON 字符串，需要解析
            var msgs = [];
            try {
                msgs = JSON.parse(d.discussion_history || '[]');
            } catch (e) {
                msgs = [];
            }
            oaDiscussMessages = msgs;
            if (d.oa_text) oaDiscussOAText = d.oa_text;
            if (d.oa_type) oaDiscussOAType = d.oa_type;
            localStorage.setItem('oa-discuss-id', d.discussion_id || discussionId);
            var container = document.getElementById('oa-discuss-messages');
            if (container) {
                container.innerHTML = '';
                msgs.forEach(function(m) {
                    addDiscussionMessage(m.role, m.content);
                });
            }
            if (container) container.scrollTop = container.scrollHeight;
            var t = window.__t || function(k) { return k; };
            var input = document.getElementById('oa-discuss-input');
            if (input) input.placeholder = t('oar.discussRecovered') || '已恢复讨论，继续输入...';
        } catch (e) {
            alert('恢复讨论失败: ' + e.message);
        }
    }

            window._oaDiscussPendingFile = {
                name: file.name,
                type: file.type,
                size: file.size,
                dataUrl: dataUrl,

            };
            if (labelEl) {

        var textarea = document.getElementById('oa-import-textarea');

        if (dialog) dialog.remove();

        // 将纯文本解析为消息列表：按段落分割，交替为用户/AI 消息
        var lines = text.split(/\n\s*\n/).map(function(s) { return s.trim(); }).filter(function(s) { return s.length > 0; });
        var messages = [];

        lines.forEach(function(line, idx) {
            var role = (idx % 2 === 0) ? 'user' : 'assistant';
            messages.push({ role: role, content: line });
        });

        if (messages.length === 0) {
            alert('未解析到有效内容');
            return;
        }

        try {
            // 如果 oaDiscussOAText 为空（未走分析流程），从已上传的 OA 文件中提取
            var oaTextForImport = oaDiscussOAText || '';
            if (!oaTextForImport && typeof uploadedData !== 'undefined' && uploadedData['oa']) {
                oaTextForImport = uploadedData['oa'].content || '';
            }
            var resp = await fetch('/api/oa/discussions/import', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    patent_number: patentNum,
                    oa_text: oaTextForImport,
                    messages: messages
                })
            });
            var data = await resp.json();
            if (!resp.ok || !data.ok) {
                alert('导入失败: ' + (data.error || '未知错误'));
                return;
            }
            // 导入成功，自动恢复该讨论（recoverOADiscussion 会解析 oa_text）
            // 同时确保 oaDiscussOAText 被填充（后端返回的 oa_text 可能为空时从 OA 文件补）
            if (!oaTextForImport) {
                // 降级：从已上传的 OA 文件提取
                if (typeof uploadedData !== 'undefined' && uploadedData['oa']) {
                    oaDiscussOAText = uploadedData['oa'].content || '';
                }
            }
            recoverOADiscussion(data.discussion_id);
            // 导入后直接渲染讨论区 + 生成按钮（不弹窗，用户可先讨论再生成）
            setTimeout(function() {
                renderImportDiscussionPanel();
            }, 300);
        } catch (e) {
            alert('导入失败: ' + e.message);
        }
    }

    function showGenerateResponseDialog() {
        var dialog = document.createElement('div');
        dialog.id = 'oa-generate-dialog';
        dialog.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.6);z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px;';
        dialog.innerHTML = ''
            + '<div style="background:#161b22;border:1px solid #30363d;border-radius:12px;padding:24px;max-width:400px;width:100%;text-align:center;">'
            + '<h3 style="margin:0 0 16px 0;color:#c9d1d9;">✅ 讨论导入成功</h3>'
            + '<p style="margin:0 0 20px 0;color:#8b949e;font-size:13px;line-height:1.6;">讨论内容已恢复，可立即生成答复书提交。</p>'
            + '<button id="oa-gen-btn" style="padding:10px 24px;background:#238636;color:#fff;border:none;border-radius:8px;font-size:14px;cursor:pointer;" data-i18n="oar.btnGenerate">📝 生成答复书</button>'
            + '</div>';
        document.body.appendChild(dialog);
        document.getElementById('oa-gen-btn').addEventListener('click', function() {
            dialog.remove();
            // 检查生成答复书所需上下文
            if (!oaDiscussOAText || oaDiscussOAText.trim().length < 10) {
                alert('⚠️ 请先在「审查意见通知书」框中粘贴 OA 全文，再生成答复书。');
                return;
            }
            generateResponseLetter();
        });
    }

    // ── 导入后渲染讨论面板（替代弹窗，允许用户先讨论再生成） ──
    function renderImportDiscussionPanel() {
        var container = document.getElementById('result');
        if (!container) return;

        // 渲染讨论消息
        var html = '<div class="result-box" style="margin-top:8px;">';
        html += '<div style="margin-bottom:12px;padding:8px 12px;background:#0d1117;border:1px solid #30363d;border-radius:6px;font-size:13px;color:#58a6ff;">';
        html += '📋 ' + (t('oar.importSuccess') || '讨论已恢复') + ' — ' + (t('oar.importHint') || '可继续讨论完善论点，确认无误后点击下方按钮生成答复书');
        html += '</div>';

        // 讨论消息区
        html += '<div style="border:1px solid #30363d;border-radius:8px;background:#0d1117;margin-bottom:16px;">';
        html += '<div style="background:#1a2332;padding:8px 12px;border-bottom:1px solid #30363d;border-radius:8px 8px 0 0;">';
        html += '<span style="color:#58a6ff;font-weight:600;font-size:14px;">💬 ' + (t('oar.discussTitle') || '讨论区') + '</span>';
        html += '</div>';
        html += '<div id="oa-discuss-messages" style="max-height:500px;overflow-y:auto;padding:16px;">';

        if (oaDiscussMessages.length === 0) {
            html += '<div style="color:#8b949e;font-size:13px;text-align:center;padding:24px;">暂无讨论内容，请继续添加</div>';
        } else {
            for (var i = 0; i < oaDiscussMessages.length; i++) {
                var msg = oaDiscussMessages[i];
                var isUser = msg.role === 'user';
                var isAssistant = msg.role === 'assistant';
                if (isUser) {
                    html += '<div style="display:flex;justify-content:flex-end;margin-bottom:16px;">';
                    html += '<div style="max-width:75%;background:#1f6feb;border-radius:8px;padding:10px 14px;font-size:13px;line-height:1.7;color:#c9d1d9;">';
                    html += escapeHtml(msg.content || '');
                    html += '</div></div>';
                } else if (isAssistant) {
                    html += '<div style="display:flex;justify-content:flex-start;margin-bottom:16px;">';
                    html += '<div style="max-width:75%;background:#0d1117;border:1px solid #30363d;border-radius:8px;padding:10px 14px;font-size:13px;line-height:1.7;color:#c9d1d9;">';
                    html += renderMarkdown(msg.content || '');
                    html += '</div></div>';
                }
            }
        }
        html += '</div></div>';

        // 输入框
        html += '<div style="border:1px solid #30363d;border-radius:8px;background:#0d1117;margin-bottom:16px;">';
        html += '<div style="background:#1a2332;padding:8px 12px;border-bottom:1px solid #30363d;border-radius:8px 8px 0 0;">';
        html += '<span style="color:#58a6ff;font-weight:600;font-size:14px;">✏️ ' + (t('oar.discussAdd') || '继续讨论') + '</span>';
        html += '</div>';
        html += '<div style="padding:8px 12px;display:flex;gap:8px;">';
        html += '<textarea id="oa-discuss-input" rows="2" placeholder="输入讨论内容..." style="flex:1;background:#161b22;border:1px solid #30363d;border-radius:6px;padding:8px 12px;color:#c9d1d9;font-size:13px;resize:vertical;" onkeydown="if(event.key===\'Enter\'&&event.shiftKey){}else if(event.key===\'Enter\'){event.preventDefault();sendOADiscussion();}"></textarea>';
        html += '<button onclick="sendOADiscussion()" style="background:#238636;color:#fff;border:none;border-radius:6px;padding:8px 16px;cursor:pointer;font-size:13px;white-space:nowrap;height:fit-content;margin-top:4px;">' + (t('oar.discussSend') || '发送') + '</button>';
        html += '</div></div>';

        // ── 生成答复书按钮 ──
        html += '<div style="margin-top:8px;text-align:center;">';
        html += '<button id="btn-generate-response" onclick="generateResponseLetter()" style="background:#f0883e;color:#fff;border:none;border-radius:8px;padding:14px 40px;cursor:pointer;font-size:16px;font-weight:600;box-shadow:0 2px 8px rgba(240,136,62,0.3);">';
        html += '📝 ' + (t('oar.btnGenerateResponse') || '生成意见陈述书');
        html += '</button>';
        html += '<div style="color:#8b949e;font-size:12px;margin-top:8px;">' + (t('oar.generateHint') || '确认讨论无误后可生成正式答复书') + '</div>';
        html += '</div>';

        html += '</div>';
        container.innerHTML = html;

        // 聚焦输入框
        var input = document.getElementById('oa-discuss-input');
        if (input) input.focus();
    }

    // ── Apply i18n for dynamic text ──
    renderNavbar('oar');
    renderSidebar();
    applyI18nCommon();
    loadOaState();
    loadOaHistory();
    initDiscQuoteEvents();
    initDeadline();
    </script>
</body>
</html>
