<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>设置 - 创研台</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="manifest" href="/static/manifest.json">
    <meta name="theme-color" content="#0d1117">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="icon" href="/static/icon.svg" type="image/svg+xml">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>
    <style>
        .settings-container {
            max-width: 900px;
            margin: 24px auto;
            padding: 30px;
            background: #1e1e1e;
            border-radius: 8px;
        }
        .setting-group {
            margin-bottom: 30px;
            padding: 20px;
            background: #2a2a2a;
            border-radius: 6px;
        }
        .setting-group h3 {
            margin-top: 0;
            color: #4a9eff;
            font-size: 18px;
        }
        .setting-group p {
            color: #999;
            font-size: 14px;
            margin: 10px 0;
        }
        .form-group {
            margin: 15px 0;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #ccc;
            font-weight: 500;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 10px;
            background: #1a1a1a;
            border: 1px solid #444;
            border-radius: 4px;
            color: #fff;
            font-size: 14px;
        }
        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: #4a9eff;
        }
        .btn-save {
            background: #4a9eff;
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            margin-top: 10px;
        }
        .btn-save:hover {
            background: #3a8eef;
        }
        .status-message {
            margin-top: 15px;
            padding: 10px;
            border-radius: 4px;
            display: none;
        }
        .status-message.success {
            background: #1a4d2e;
            color: #4ade80;
            border: 1px solid #4ade80;
        }
        .status-message.error {
            background: #4d1a1a;
            color: #f87171;
            border: 1px solid #f87171;
        }
        .help-link {
            color: #4a9eff;
            text-decoration: none;
            font-size: 13px;
        }
        .help-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <nav id="global-nav"></nav>
    <div class="page-with-sidebar">
    <div class="settings-container page-main">
        <h2>系统设置</h2>

        <div class="setting-group">
            <h3>🔑 SerpAPI 搜索配置（多 Key 轮询）</h3>

            <p>配置多个 SerpAPI Key 自动轮询，突破单账号每月 250 次限制。未配置时自动回退本地数据库。</p>
            <p style="color:#f0ad4e;font-size:13px;">注册地址：<a href="https://serpapi.com/manage-api-key" target="_blank">https://serpapi.com/manage-api-key</a></p>
            <div id="serpapi-key-list"></div>
            <button class="btn-save" style="background:#21262d;margin-top:8px;" onclick="addSerpapiKeyRow()">+ 添加 SerpAPI Key</button>
            <button class="btn-save" onclick="saveSerpApiKey()">保存</button>
            <div id="serpapi-status" class="status-message"></div>

            <div style="margin-top:15px;padding:12px;background:#161b22;border:1px solid #30363d;border-radius:6px;">
                <strong style="color:#58a6ff;">📊 SerpAPI 余额 / 用量</strong>
                <div id="serpapi-balance-content" style="margin-top:8px;color:#c9d1d9;font-size:14px;">
                    点击查询加载...
                </div>
                <button class="btn-save" style="background:#21262d;margin-top:8px;padding:6px 16px;font-size:13px;" onclick="fetchSerpapiBalance()">🔄 刷新余额</button>
            </div>
        </div>

        <div class="setting-group">
            <h3>🤖 <span id="ai-provider-title">AI</span> 配置</h3>
            <p>当前默认 AI 服务商，用于专利分析、创意验证等。</p>

            <div class="form-group">
                <label>AI 服务商</label>
                <select id="ai-provider" style="width:100%;padding:10px;background:#1a1a1a;border:1px solid #444;border-radius:4px;color:#fff;font-size:14px;">
                    <option value="deepseek">DeepSeek（当前）</option>
                    <option value="xiaomi">小米 MiMo（支持看图）</option>
                    <option value="sensetime">商汤 SenseNova</option>
                    <option value="openrouter">OpenRouter（GPT-4o 等）</option>
                    <option value="gemini">Google Gemini（支持看图）</option>
                    <option value="custom">自定义</option>
                </select>
            </div>

            <div class="form-group">
                <label>API Key</label>
                <input type="text" id="ai-api-key" placeholder="输入 API Key">
                <a id="ai-key-link" href="https://platform.deepseek.com/" target="_blank" class="help-link">
                    → 获取 API Key
                </a>
            </div>

            <div class="form-group">
                <label>API Base URL</label>
                <input type="text" id="ai-base-url" value="https://api.deepseek.com/v1" placeholder="https://api.deepseek.com/v1">
                <span style="color:#999;font-size:13px;" id="ai-base-hint">兼容 OpenAI 格式的 API 地址</span>
            </div>

            <div class="form-group">
                <label>AI 模型（默认）</label>
                <select id="ai-model" style="width:100%;padding:10px;background:#1a1a1a;border:1px solid #444;border-radius:4px;color:#fff;font-size:14px;">
                </select>
                <div id="custom-model-group" class="form-group" style="display:none;margin-top:8px;">
                    <label>自定义模型名称</label>
                    <input type="text" id="ai-model-custom" placeholder="输入模型名称">
                </div>
                <span style="color:#999;font-size:13px;" id="ai-model-hint">选择模型或切换至自定义输入</span>
            </div>

            <div class="form-group">
                <label>专家模型（深度分析）</label>
                <select id="ai-model-expert" style="width:100%;padding:10px;background:#1a1a1a;border:1px solid #444;border-radius:4px;color:#fff;font-size:14px;">
                </select>
                <div id="custom-expert-model-group" class="form-group" style="display:none;margin-top:8px;">
                    <label>自定义专家模型名称</label>
                    <input type="text" id="ai-model-expert-custom" placeholder="输入模型名称">
                </div>
                <span style="color:#999;font-size:13px;">用于创新推演、创造性分析、侵权评估等高推理任务</span>
            </div>

            <button class="btn-save" onclick="saveAiConfig()">保存</button>
            <div id="ai-status" class="status-message"></div>
        </div>


        <!-- 备用搜索源（Firecrawl/Bing/CNIPR）和备用 AI 已屏蔽，仅保留 SerpAPI + DeepSeek -->

        <div class="setting-group">
            <h3>ℹ️ 当前配置状态</h3>
            <p id="config-status">加载中...</p>
        </div>
    </div>
    <aside id="page-sidebar" class="page-sidebar"></aside>
    </div>

    <script src="/static/i18n.js"></script>
    <script>
        renderNavbar('settings');
        renderSidebar();
        applyI18nCommon();

        // ── AI 服务商预设数据 ──
        var AI_PROVIDERS = {
            deepseek: {
                title: 'DeepSeek',
                base_url: 'https://api.deepseek.com/v1',
                key_link: 'https://platform.deepseek.com/',
                models: [
                    {value: 'deepseek-chat', label: 'DeepSeek Chat (V3，通用对话)'},
                    {value: 'deepseek-reasoner', label: 'DeepSeek Reasoner (R1，深度推理)'},
                    {value: 'deepseek-chat-v4-flash', label: 'DeepSeek Flash (快速)'},
                ],
                expert_models: [
                    {value: 'deepseek-reasoner', label: 'DeepSeek Reasoner (R1，深度推理) (推荐)'},
                    {value: 'deepseek-chat', label: 'DeepSeek Chat (V3，通用对话)'},
                    {value: 'deepseek-chat-v4-flash', label: 'DeepSeek Flash (快速)'},
                ],
                hint: '兼容 OpenAI 格式的 API 地址'
            },
            xiaomi: {
                title: '小米 MiMo',
                base_url: 'https://api.xiaomimimo.com/v1',
                key_link: 'https://platform.xiaomimimo.com',
                models: [
                    {value: 'mimo-v2.5-pro', label: 'MiMo V2.5 Pro（推荐，支持看图）'},
                    {value: 'mimo-v2.5', label: 'MiMo V2.5'},
                    {value: 'mimo-v2-omni', label: 'MiMo V2 Omni'},
                ],
                expert_models: [
                    {value: 'mimo-v2.5-pro', label: 'MiMo V2.5 Pro（推荐，支持看图）'},
                    {value: 'mimo-v2.5', label: 'MiMo V2.5'},
                ],
                hint: '小米 MiMo API，支持图片多模态'
            },
            sensetime: {
                title: '商汤 SenseNova',
                base_url: 'https://api.sensenova.cn/v1',
                key_link: 'https://platform.sensenova.cn/',
                models: [
                    {value: 'SenseChat-5', label: 'SenseChat 5（日日新）'},
                    {value: 'SenseChat-Turbo', label: 'SenseChat Turbo'},
                ],
                expert_models: [
                    {value: 'SenseChat-5', label: 'SenseChat 5（日日新）'},
                    {value: 'SenseChat-Turbo', label: 'SenseChat Turbo'},
                ],
                hint: '商汤日日新 API'
            },
            openrouter: {
                title: 'OpenRouter',
                base_url: 'https://openrouter.ai/api/v1',
                key_link: 'https://openrouter.ai/keys',
                models: [
                    {value: 'gpt-4o', label: 'GPT-4o（支持看图）'},
                    {value: 'gpt-4o-mini', label: 'GPT-4o Mini'},
                ],
                expert_models: [
                    {value: 'gpt-4o', label: 'GPT-4o（支持看图）'},
                    {value: 'gpt-4o-mini', label: 'GPT-4o Mini'},
                ],
                hint: 'OpenRouter 统一 API 网关'
            },
            gemini: {
                title: 'Google Gemini',
                base_url: 'https://generativelanguage.googleapis.com/v1beta/openai',
                key_link: 'https://aistudio.google.com/apikey',
                models: [
                    {value: 'gemini-2.5-flash', label: 'Gemini 2.5 Flash（推荐，支持看图）'},
                    {value: 'gemini-2.5-pro', label: 'Gemini 2.5 Pro（最强，需付费）'},
                    {value: 'gemini-2.0-flash', label: 'Gemini 2.0 Flash'},
                    {value: 'gemini-2.0-flash-lite', label: 'Gemini 2.0 Flash Lite'},
                ],
                expert_models: [
                    {value: 'gemini-2.5-pro', label: 'Gemini 2.5 Pro（最强）'},
                    {value: 'gemini-2.5-flash', label: 'Gemini 2.5 Flash'},
                    {value: 'gemini-2.0-flash', label: 'Gemini 2.0 Flash'},
                ],
                hint: 'Google Gemini API（OpenAI 兼容接口）'
            }
        };

        function detectProvider(baseUrl) {
            baseUrl = (baseUrl || '').toLowerCase();
            if (baseUrl.includes('deepseek')) return 'deepseek';
            if (baseUrl.includes('xiaomimimo')) return 'xiaomi';
            if (baseUrl.includes('sensenova')) return 'sensetime';
            if (baseUrl.includes('openrouter')) return 'openrouter';
            if (baseUrl.includes('googleapis')) return 'gemini';
            return 'custom';
        }

        function updateProviderUI(providerKey) {
            var provider = AI_PROVIDERS[providerKey];
            if (!provider) providerKey = 'custom';

            document.getElementById('ai-provider-title').textContent = provider ? provider.title : '自定义';
            document.getElementById('ai-provider').value = providerKey;

            if (provider) {
                document.getElementById('ai-base-url').value = provider.base_url;
                document.getElementById('ai-key-link').href = provider.key_link;
                document.getElementById('ai-key-link').textContent = '\u2192 \u83b7\u53d6 ' + provider.title + ' Key';
                document.getElementById('ai-base-hint').textContent = provider.hint;
                populateSelect('ai-model', provider.models, '');
                populateSelect('ai-model-expert', provider.expert_models, '');
            }

            document.getElementById('custom-model-group').style.display = 'none';
            document.getElementById('custom-expert-model-group').style.display = 'none';
        }

        function populateSelect(selectId, options, currentValue) {
            var select = document.getElementById(selectId);
            select.innerHTML = '';
            for (var i = 0; i < options.length; i++) {
                var opt = document.createElement('option');
                opt.value = options[i].value;
                opt.textContent = options[i].label;
                select.appendChild(opt);
            }
            var custom = document.createElement('option');
            custom.value = 'custom';
            custom.textContent = '\u81ea\u5b9a\u4e49\u6a21\u578b...';
            select.appendChild(custom);
            if (currentValue) {
                select.value = currentValue;
                if (select.value !== currentValue) {
                    select.value = 'custom';
                }
            }
        }

        function onProviderChange() {
            var val = document.getElementById('ai-provider').value;
            if (val === 'custom') {
                document.getElementById('ai-provider-title').textContent = '\u81ea\u5b9a\u4e49';
                return;
            }
            updateProviderUI(val);
        }

        // 页面加载时获取当前配置
        let returnUrl = ''; // 记录返回地址

        window.onload = async function() {
            // 从 URL 参数获取返回地址
            const urlParams = new URLSearchParams(window.location.search);
            returnUrl = urlParams.get('from') || document.referrer || '';

            try {
                const res = await fetch('/api/settings');
                if (res.ok) {
                    const config = await res.json();

                    // Load SerpAPI multi-key list
                    if (config.serpapi_keys && config.serpapi_keys.length > 0) {
                        config.serpapi_keys.forEach(function(k) {
                            addSerpapiKeyRow(k);
                        });
                    } else {
                        addSerpapiKeyRow('');
                    }

                    document.getElementById('ai-base-url').value = config.ai_base_url || 'https://api.deepseek.com/v1';
                    document.getElementById('ai-api-key').value = config.ai_api_key || '';

                    // 根据 base_url 自动检测服务商并填充下拉
                    var detectedProvider = detectProvider(config.ai_base_url);
                    updateProviderUI(detectedProvider);

                    // 设置模型下拉值
                    var modelVal = config.ai_model || '';
                    var modelSelect = document.getElementById('ai-model');
                    if (modelVal) {
                        modelSelect.value = modelVal;
                        if (modelSelect.value !== modelVal) {
                            modelSelect.value = 'custom';
                            document.getElementById('custom-model-group').style.display = 'block';
                            document.getElementById('ai-model-custom').value = modelVal;
                        }
                    }

                    var expertVal = config.ai_model_expert || '';
                    var expertSelect = document.getElementById('ai-model-expert');
                    if (expertVal) {
                        expertSelect.value = expertVal;
                        if (expertSelect.value !== expertVal) {
                            expertSelect.value = 'custom';
                            document.getElementById('custom-expert-model-group').style.display = 'block';
                            document.getElementById('ai-model-expert-custom').value = expertVal;
                        }
                    }

                    // 初次加载刷新余额
                    fetchSerpapiBalance();
                    updateConfigStatus(config);
                }
            } catch (e) {
                console.error('Failed to load config:', e);
            }
        };
        
        // 返回上一页
        function goBack() {
            if (returnUrl && !returnUrl.includes('/settings')) {
                window.location.href = returnUrl;
            } else {
                window.history.back();
            }
        }

        function updateConfigStatus(config) {
            const status = [];

            if (config.serpapi_key_configured) {
                status.push('✅ SerpAPI 已配置（Google Patents）');
            } else {
                status.push('⚠️ SerpAPI 未配置，将仅搜索本地数据库');
            }

            if (config.ai_api_key_configured) {
                status.push('✅ AI 服务已配置（DeepSeek）');
            } else {
                status.push('❌ AI 服务未配置（无法使用智能分析）');
            }

            document.getElementById('config-status').innerHTML = DOMPurify.sanitize(status.join('<br>'));
        }

        // 以下功能已屏蔽（仅保留 SerpAPI + DeepSeek）：
        // Firecrawl/Bing/CNIPR/搜狗搜索源、备用 AI 服务商 均已移除

        // ── SerpAPI Multi-Key Management ──
        var serpapiKeyCount = 0;
        function addSerpapiKeyRow(key) {
            if (serpapiKeyCount >= 5) return;
            serpapiKeyCount++;
            var i = serpapiKeyCount;
            var container = document.getElementById('serpapi-key-list');
            var row = document.createElement('div');
            row.style.cssText = 'background:#161b22;border:1px solid #30363d;border-radius:6px;padding:10px;margin-bottom:8px;';

            var header = document.createElement('div');
            header.style.cssText = 'display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;';
            var title = document.createElement('strong');
            title.style.color = '#58a6ff';
            title.textContent = 'SerpAPI Key #' + i;
            var delBtn = document.createElement('button');
            delBtn.style.cssText = 'background:#da3633;padding:2px 8px;font-size:0.8em;color:white;border:none;border-radius:4px;cursor:pointer;';
            delBtn.textContent = '删除';
            delBtn.addEventListener('click', function() { row.remove(); serpapiKeyCount--; });
            header.appendChild(title);
            header.appendChild(delBtn);
            row.appendChild(header);

            var input = document.createElement('input');
            input.type = 'text';
            input.id = 'serpapi-key-' + i;
            input.placeholder = '输入 SerpAPI Key #' + i;
            input.value = key || '';
            input.style.cssText = 'width:100%;padding:8px;background:#0d1117;border:1px solid #30363d;border-radius:4px;color:#c9d1d9;font-size:0.9em;box-sizing:border-box;';
            row.appendChild(input);
            container.appendChild(row);
        }


        // ── AI 服务商/模型下拉切换 ──
        document.addEventListener('change', function(e) {
            if (e.target && e.target.id === 'ai-provider') {
                onProviderChange();
            }
            if (e.target && e.target.id === 'ai-model') {
                var customGroup = document.getElementById('custom-model-group');
                customGroup.style.display = e.target.value === 'custom' ? 'block' : 'none';
            }
            if (e.target && e.target.id === 'ai-model-expert') {
                var customGroup = document.getElementById('custom-expert-model-group');
                customGroup.style.display = e.target.value === 'custom' ? 'block' : 'none';
            }
        });

        // ── SerpAPI 余额查询 ──
        async function fetchSerpapiBalance() {
            var contentEl = document.getElementById('serpapi-balance-content');
            contentEl.textContent = '查询中...';
            try {
                const res = await fetch('/api/settings/serpapi/balance');
                const data = await res.json();
                if (data.status === 'ok') {
                    var used = data.this_month_usage || 0;
                    var limit = data.searches_per_month || 250;
                    var remaining = data.remaining || 0;
                    var pct = limit > 0 ? Math.round(used / limit * 100) : 0;
                    var barColor = pct > 80 ? '#f85149' : pct > 60 ? '#d29922' : '#3fb950';
                    contentEl.innerHTML = DOMPurify.sanitize(
                        '<div style="display:flex;justify-content:space-between;margin-bottom:4px;">' +
                            '<span>已用：' + used + ' / ' + limit + '（' + pct + '%）</span>' +
                            '<span>剩余：' + remaining + '</span>' +
                        '</div>' +
                        '<div style="background:#0d1117;border-radius:4px;height:8px;overflow:hidden;">' +
                            '<div style="width:' + Math.min(pct, 100) + '%;background:' + barColor + ';height:100%;border-radius:4px;"></div>' +
                        '</div>' +
                        '<div style="margin-top:4px;color:#8b949e;font-size:12px;">' +
                            '套餐：' + DOMPurify.sanitize(data.plan_name || 'Free') +
                            ' | 配置 Key 数：' + data.key_count +
                        '</div>'
                    );
                } else {
                    contentEl.textContent = '❌ ' + (data.message || '查询失败');
                }
            } catch (e) {
                contentEl.textContent = '❌ 网络错误：' + e.message;
            }
        }

        async function saveSerpApiKey() {
            var statusEl = document.getElementById('serpapi-status');
            var keys = [];
            var inputs = document.querySelectorAll('#serpapi-key-list input[type="text"]');
            for (var i = 0; i < inputs.length; i++) {
                var val = inputs[i].value.trim();
                if (val) keys.push(val);
            }
            try {
                const res = await fetch('/api/settings/serpapi', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ api_keys: keys })
                });
                const data = await res.json();
                if (res.ok && data.status === 'ok') {
                    showStatus(statusEl, 'success', '✅ 已保存 ' + keys.length + ' 个 SerpAPI Key（轮询模式）');
                } else {
                    showStatus(statusEl, 'error', data.message || '保存失败，请重试');
                }
            } catch (e) {
                showStatus(statusEl, 'error', '网络错误：' + e.message);
            }
        }

        async function saveAiConfig() {
            const baseUrl = document.getElementById('ai-base-url').value.trim();
            const apiKey = document.getElementById('ai-api-key').value.trim();
            var modelSelect = document.getElementById('ai-model');
            var model = modelSelect.value === 'custom'
                ? document.getElementById('ai-model-custom').value.trim()
                : modelSelect.value;
            var expertSelect = document.getElementById('ai-model-expert');
            var expertModel = expertSelect.value === 'custom'
                ? document.getElementById('ai-model-expert-custom').value.trim()
                : expertSelect.value;
            const statusEl = document.getElementById('ai-status');

            if (!baseUrl || !apiKey || !model) {
                showStatus(statusEl, 'error', '请填写完整的 AI 配置');
                return;
            }

            try {
                const res = await fetch('/api/settings/ai', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ base_url: baseUrl, api_key: apiKey, model: model, ai_model_expert: expertModel })
                });

                const data = await res.json();
                if (res.ok && data.status === 'ok') {
                    showStatus(statusEl, 'success', '✅ AI 配置已保存！');
                    // 刷新配置状态
                    try {
                        const refreshRes = await fetch('/api/settings');
                        if (refreshRes.ok) {
                            const refreshed = await refreshRes.json();
                            updateConfigStatus(refreshed);
                        }
                    } catch (_) {}
                } else {
                    showStatus(statusEl, 'error', data.message || '保存失败，请重试');
                }
            } catch (e) {
                showStatus(statusEl, 'error', '网络错误：' + e.message);
            }
        }

        function showStatus(element, type, message) {
            element.className = 'status-message ' + type;
            element.textContent = message;
            element.style.display = 'block';
            setTimeout(() => {
                element.style.display = 'none';
            }, 3000);
        }

        // 备用 AI 管理已移除（仅保留 DeepSeek）
    </script>
</body>
