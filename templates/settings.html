<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>设置 - 创研台</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="manifest" href="/static/manifest.json">
    <meta name="theme-color" content="#0d1117">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="icon" href="/static/icon.svg" type="image/svg+xml">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>
    <style>
        .settings-container {
            max-width: 900px;
            margin: 24px auto;
            padding: 30px;
            background: #1e1e1e;
            border-radius: 8px;
        }
        .setting-group {
            margin-bottom: 30px;
            padding: 20px;
            background: #2a2a2a;
            border-radius: 6px;
        }
        .setting-group h3 {
            margin-top: 0;
            color: #4a9eff;
            font-size: 18px;
        }
        .setting-group p {
            color: #999;
            font-size: 14px;
            margin: 10px 0;
        }
        .form-group {
            margin: 15px 0;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #ccc;
            font-weight: 500;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 10px;
            background: #1a1a1a;
            border: 1px solid #444;
            border-radius: 4px;
            color: #fff;
            font-size: 14px;
        }
        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: #4a9eff;
        }
        .btn-save {
            background: #4a9eff;
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            margin-top: 10px;
        }
        .btn-save:hover {
            background: #3a8eef;
        }
        .status-message {
            margin-top: 15px;
            padding: 10px;
            border-radius: 4px;
            display: none;
        }
        .status-message.success {
            background: #1a4d2e;
            color: #4ade80;
            border: 1px solid #4ade80;
        }
        .status-message.error {
            background: #4d1a1a;
            color: #f87171;
            border: 1px solid #f87171;
        }
        .help-link {
            color: #4a9eff;
            text-decoration: none;
            font-size: 13px;
        }
        .help-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <nav id="global-nav"></nav>
    <div class="page-with-sidebar">
    <div class="settings-container page-main">
        <h2>系统设置</h2>

        <div class="setting-group">
            <h3>🔑 SerpAPI 搜索配置（多 Key 轮询）</h3>
            <p>配置多个 SerpAPI Key 自动轮询，突破单账号每月 250 次限制。未配置时自动回退本地数据库。</p>
            <p style="color:#f0ad4e;font-size:13px;">注册地址：<a href="https://serpapi.com/manage-api-key" target="_blank">https://serpapi.com/manage-api-key</a></p>
            <div id="serpapi-key-list"></div>
            <button class="btn-save" style="background:#21262d;margin-top:8px;" onclick="addSerpapiKeyRow()">+ 添加 SerpAPI Key</button>
            <button class="btn-save" onclick="saveSerpApiKey()">保存</button>
            <div id="serpapi-status" class="status-message"></div>
        </div>

        <div class="setting-group">
            <h3>🤖 DeepSeek AI 配置</h3>
            <p>当前默认 AI 服务商，用于专利分析、创意验证等。</p>

            <div class="form-group">
                <label>API Key</label>
                <input type="text" id="ai-api-key" placeholder="输入 DeepSeek API Key">
                <a href="https://platform.deepseek.com/" target="_blank" class="help-link">
                    → 获取 DeepSeek Key
                </a>
            </div>

            <input type="hidden" id="ai-base-url" value="https://api.deepseek.com/v1">
            <input type="hidden" id="ai-model" value="deepseek-chat">

            <button class="btn-save" onclick="saveAiConfig()">保存</button>
            <div id="ai-status" class="status-message"></div>
        </div>

        <!-- 备用搜索源（Firecrawl/Bing/CNIPR）和备用 AI 已屏蔽，仅保留 SerpAPI + DeepSeek -->

        <div class="setting-group">
            <h3>ℹ️ 当前配置状态</h3>
            <p id="config-status">加载中...</p>
        </div>
    </div>
    <aside id="page-sidebar" class="page-sidebar"></aside>
    </div>

    <script src="/static/i18n.js"></script>
    <script>
        renderNavbar('settings');
        renderSidebar();
        applyI18nCommon();

        // 页面加载时获取当前配置
        let returnUrl = ''; // 记录返回地址

        window.onload = async function() {
            // 从 URL 参数获取返回地址
            const urlParams = new URLSearchParams(window.location.search);
            returnUrl = urlParams.get('from') || document.referrer || '';

            try {
                const res = await fetch('/api/settings');
                if (res.ok) {
                    const config = await res.json();
                    // Load SerpAPI multi-key list
                    if (config.serpapi_keys && config.serpapi_keys.length > 0) {
                        config.serpapi_keys.forEach(function(k) {
                            addSerpapiKeyRow(k);
                        });
                    } else {
                        addSerpapiKeyRow('');
                    }
                    document.getElementById('ai-base-url').value = config.ai_base_url || 'https://api.deepseek.com/v1';
                    document.getElementById('ai-api-key').value = config.ai_api_key || '';
                    document.getElementById('ai-model').value = config.ai_model || 'deepseek-chat';

                    updateConfigStatus(config);
                }
            } catch (e) {
                console.error('Failed to load config:', e);
            }
        };
        
        // 返回上一页
        function goBack() {
            if (returnUrl && !returnUrl.includes('/settings')) {
                window.location.href = returnUrl;
            } else {
                window.history.back();
            }
        }

        function updateConfigStatus(config) {
            const status = [];

            if (config.serpapi_key_configured) {
                status.push('✅ SerpAPI 已配置（Google Patents）');
            } else {
                status.push('⚠️ SerpAPI 未配置，将仅搜索本地数据库');
            }

            if (config.ai_api_key_configured) {
                status.push('✅ AI 服务已配置（DeepSeek）');
            } else {
                status.push('❌ AI 服务未配置（无法使用智能分析）');
            }

            document.getElementById('config-status').innerHTML = DOMPurify.sanitize(status.join('<br>'));
        }

        // 以下功能已屏蔽（仅保留 SerpAPI + DeepSeek）：
        // Firecrawl/Bing/CNIPR/搜狗搜索源、备用 AI 服务商 均已移除

        // ── SerpAPI Multi-Key Management ──
        var serpapiKeyCount = 0;
        function addSerpapiKeyRow(key) {
            if (serpapiKeyCount >= 5) return;
            serpapiKeyCount++;
            var i = serpapiKeyCount;
            var container = document.getElementById('serpapi-key-list');
            var row = document.createElement('div');
            row.style.cssText = 'background:#161b22;border:1px solid #30363d;border-radius:6px;padding:10px;margin-bottom:8px;';

            var header = document.createElement('div');
            header.style.cssText = 'display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;';
            var title = document.createElement('strong');
            title.style.color = '#58a6ff';
            title.textContent = 'SerpAPI Key #' + i;
            var delBtn = document.createElement('button');
            delBtn.style.cssText = 'background:#da3633;padding:2px 8px;font-size:0.8em;color:white;border:none;border-radius:4px;cursor:pointer;';
            delBtn.textContent = '删除';
            delBtn.addEventListener('click', function() { row.remove(); serpapiKeyCount--; });
            header.appendChild(title);
            header.appendChild(delBtn);
            row.appendChild(header);

            var input = document.createElement('input');
            input.type = 'text';
            input.id = 'serpapi-key-' + i;
            input.placeholder = '输入 SerpAPI Key #' + i;
            input.value = key || '';
            input.style.cssText = 'width:100%;padding:8px;background:#0d1117;border:1px solid #30363d;border-radius:4px;color:#c9d1d9;font-size:0.9em;box-sizing:border-box;';
            row.appendChild(input);
            container.appendChild(row);
        }

        async function saveSerpApiKey() {
            var statusEl = document.getElementById('serpapi-status');
            var keys = [];
            var inputs = document.querySelectorAll('#serpapi-key-list input[type="text"]');
            for (var i = 0; i < inputs.length; i++) {
                var val = inputs[i].value.trim();
                if (val) keys.push(val);
            }
            try {
                const res = await fetch('/api/settings/serpapi', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ api_keys: keys })
                });
                const data = await res.json();
                if (res.ok && data.status === 'ok') {
                    showStatus(statusEl, 'success', '✅ 已保存 ' + keys.length + ' 个 SerpAPI Key（轮询模式）');
                } else {
                    showStatus(statusEl, 'error', data.message || '保存失败，请重试');
                }
            } catch (e) {
                showStatus(statusEl, 'error', '网络错误：' + e.message);
            }
        }

        async function saveAiConfig() {
            const baseUrl = document.getElementById('ai-base-url').value.trim();
            const apiKey = document.getElementById('ai-api-key').value.trim();
            const model = document.getElementById('ai-model').value.trim();
            const statusEl = document.getElementById('ai-status');

            if (!baseUrl || !apiKey || !model) {
                showStatus(statusEl, 'error', '请填写完整的 AI 配置');
                return;
            }

            try {
                const res = await fetch('/api/settings/ai', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ base_url: baseUrl, api_key: apiKey, model: model })
                });

                const data = await res.json();
                if (res.ok && data.status === 'ok') {
                    showStatus(statusEl, 'success', '✅ AI 配置已保存！');
                } else {
                    showStatus(statusEl, 'error', data.message || '保存失败，请重试');
                }
            } catch (e) {
                showStatus(statusEl, 'error', '网络错误：' + e.message);
            }
        }

        function showStatus(element, type, message) {
            element.className = 'status-message ' + type;
            element.textContent = message;
            element.style.display = 'block';
            setTimeout(() => {
                element.style.display = 'none';
            }, 3000);
        }

        // 备用 AI 管理已移除（仅保留 DeepSeek）
    </script>
</body>
</html>
