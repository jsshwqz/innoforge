<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 助手 - 创研台</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="manifest" href="/static/manifest.json">
    <meta name="theme-color" content="#0d1117">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="icon" href="/static/icon.svg" type="image/svg+xml">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>
    <style>
    .quote-btn {
        position: absolute;
        background: #238636;
        color: #fff;
        padding: 4px 10px;
        border-radius: 4px;
        font-size: 12px;
        cursor: pointer;
        z-index: 100;
        display: none;
        white-space: nowrap;
        user-select: none;
        box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        pointer-events: auto;
        line-height: 1.4;
    }
    .quote-btn:hover {
        background: #2ea043;
    }
    .quote-line {
        border-left: 3px solid #58a6ff;
        padding-left: 10px;
        margin: 4px 0;
        color: #8b949e;
        font-style: italic;
    }
    </style>
</head>
<body>
    <nav id="global-nav"></nav>
    <div class="page-with-sidebar">
    <main class="container page-main">
        <div class="chat-container">
            <h2 style="margin-bottom:8px;" data-i18n="ai.title"></h2>
            <p class="hint" data-i18n="ai.hint"></p>
            <div class="chat-box" id="chat-messages" style="position:relative;"></div>
            <button class="scroll-bottom-btn" id="scroll-bottom-btn" onclick="scrollChatToBottom()">↓</button>
            <div class="chat-input">
                <div class="chat-input-wrap">
                    <textarea id="chat-msg" rows="1" data-i18n-placeholder="ai.placeholder" autofocus></textarea>
                    <div id="image-preview-area" class="image-preview-area" style="display:none;"></div>
                </div>
                <button onclick="sendChat()" data-i18n="ai.send"></button>
            </div>
        </div>
    </main>
    <aside id="page-sidebar" class="page-sidebar"></aside>
    </div>
    <script src="/static/i18n.js"></script>
    <script>
    renderNavbar('ai');
    renderSidebar(
      '<div class="sidebar-section">'
      + '<div class="sidebar-label">' + (i18nLang === 'zh' ? '搜索选项' : 'Search') + '</div>'
      + '<label class="sidebar-toggle" title="开启后 AI 会先联网搜索最新资料再回答">'
      + '<input type="checkbox" id="web-search-cb">'
      + '<span data-i18n="ai.webSearch">' + t('ai.webSearch') + '</span>'
      + '</label>'
      + '</div>'
    );
    </script>
    <script>
    function escapeHtml(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

    // ── 持久化存储（后端 SQLite 替代 localStorage）──
    var AI_CHAT_KEY = 'innoforge_ai_chat';
    var chatHistory = [];
    var chatSending = false;
    var retryMsg = '';
    var retryImages = [];

    // 一次性迁移：将旧 localStorage 中的聊天记录导入后端
    function migrateOldChat(key) {
        var saved = localStorage.getItem(key);
        if (!saved) return;
        try {
            var old = JSON.parse(saved);
            if (!old || old.length === 0) return;
            for (var i = 0; i < old.length; i++) {
                var m = old[i];
                fetch('/api/chat/' + encodeURIComponent(key) + '/save', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({role: m[0], content: m[1]})
                }).catch(function(e) { console.warn('迁移旧聊天记录失败:', e); });
            }
            console.log('已迁移 ' + old.length + ' 条旧聊天记录到后端');
        } catch(e) {}
    }

    // 页面加载时从后端恢复历史
    (function loadChatHistory() {
        fetch('/api/chat/' + encodeURIComponent(AI_CHAT_KEY))
            .then(function(r) { return r.json(); })
            .then(function(data) {
                if (data.status === 'ok' && data.messages && data.messages.length > 0) {
                    chatHistory = [];
                    data.messages.forEach(function(m) {
                        chatHistory.push([m.role, m.content]);
                    });
                } else {
                    // 后端无数据时，尝试从旧 localStorage 迁移
                    migrateOldChat(AI_CHAT_KEY);
                    var saved = localStorage.getItem(AI_CHAT_KEY);
                    if (saved) {
                        try { chatHistory = JSON.parse(saved); } catch(e) {}
                    }
                }
                renderAllMessages();
            })
            .catch(function() {
                // 后端不可用时降级到 localStorage
                var saved = localStorage.getItem(AI_CHAT_KEY);
                if (saved) {
                    try { chatHistory = JSON.parse(saved); } catch(e) {}
                }
                renderAllMessages();
            });
    })();

    function renderAllMessages() {
        var box = document.getElementById('chat-messages');
        box.innerHTML = '';
        for (var i = 0; i < chatHistory.length; i += 2) {
            var userDiv = document.createElement('div');
            renderUserMessage(userDiv, chatHistory[i][1]);
            box.appendChild(userDiv);
            var aiDiv = document.createElement('div');
            aiDiv.className = 'msg ai';
            aiDiv.innerHTML = DOMPurify.sanitize(escapeHtml(chatHistory[i+1][1]).replace(/\n/g, '<br>'));
            box.appendChild(aiDiv);
        }
        box.scrollTop = box.scrollHeight;
    }

    // ── 滚到底部按钮 ──
    var chatBox = document.getElementById('chat-messages');
    var scrollBtn = document.getElementById('scroll-bottom-btn');
    if (chatBox && scrollBtn) {
        chatBox.addEventListener('scroll', function() {
            var threshold = 200;
            var atBottom = chatBox.scrollHeight - chatBox.scrollTop - chatBox.clientHeight < threshold;
            scrollBtn.classList.toggle('visible', !atBottom);
        });
    }
    function scrollChatToBottom() {
        if (chatBox) {
            chatBox.scrollTo({ top: chatBox.scrollHeight, behavior: 'smooth' });
            scrollBtn.classList.remove('visible');
        }
    }

    // ── 引用选中文字 / Quote selected text ──
    var quoteBtn = null;
    var selectedQuoteText = '';

    function createQuoteButton() {
        var btn = document.createElement('div');
        btn.className = 'quote-btn';
        btn.textContent = t('ai.quote');
        btn.addEventListener('click', function(e) {
            e.stopPropagation();
            insertQuote();
        });
        document.getElementById('chat-messages').appendChild(btn);
        return btn;
    }

    function getQuoteBtn() {
        if (!quoteBtn) quoteBtn = createQuoteButton();
        return quoteBtn;
    }

    function showQuoteButton(text, rect) {
        var btn = getQuoteBtn();
        selectedQuoteText = text;
        var container = document.getElementById('chat-messages');
        var cr = container.getBoundingClientRect();
        var left = rect.right - cr.left - btn.offsetWidth / 2;
        var top = rect.top - cr.top - 36;
        // 确保不溢出容器边界
        left = Math.max(4, Math.min(left, cr.width - btn.offsetWidth - 4));
        top = Math.max(4, top);
        btn.style.left = left + 'px';
        btn.style.top = top + 'px';
        btn.style.display = 'block';
    }

    function hideQuoteButton() {
        var btn = getQuoteBtn();
        btn.style.display = 'none';
        selectedQuoteText = '';
    }

    function insertQuote() {
        if (!selectedQuoteText) return;
        var textarea = document.getElementById('chat-msg');
        // 每行前加 "> "，末尾加两个换行
        var quoted = selectedQuoteText.split('\n').map(function(line) {
            return '> ' + line;
        }).join('\n') + '\n\n';
        var start = textarea.selectionStart;
        var end = textarea.selectionEnd;
        var before = textarea.value.substring(0, start);
        var after = textarea.value.substring(end);
        textarea.value = before + quoted + after;
        var newPos = start + quoted.length;
        textarea.selectionStart = textarea.selectionEnd = newPos;
        textarea.style.height = 'auto';
        textarea.style.height = textarea.scrollHeight + 'px';
        textarea.focus();
        hideQuoteButton();
    }

    // 格式化用户消息：将 > 前缀行渲染为 blockquote
    function formatUserContent(text) {
        if (!text || (text.indexOf('\n> ') === -1 && !text.startsWith('> '))) {
            return null;
        }
        var lines = text.split('\n');
        var parts = [];
        for (var i = 0; i < lines.length; i++) {
            var line = lines[i];
            if (line.startsWith('> ')) {
                parts.push('<div class="quote-line">' + escapeHtml(line.substring(2)) + '</div>');
            } else if (line === '>') {
                parts.push('<div class="quote-line"></div>');
            } else {
                parts.push(escapeHtml(line));
            }
        }
        return DOMPurify.sanitize(parts.join('<br>'));
    }

    // 渲染用户消息（支持 blockquote + 图片）
    function renderUserMessage(container, text, images) {
        container.className = 'msg user';
        var formatted = formatUserContent(text);
        if (formatted) {
            container.innerHTML = formatted;
        } else {
            container.textContent = text;
        }
        if (images && images.length > 0) {
            for (var i = 0; i < images.length; i++) {
                var img = document.createElement('img');
                img.src = 'data:image/png;base64,' + images[i];
                img.style.cssText = 'max-width:120px;max-height:120px;border-radius:4px;margin-top:4px;display:block;';
                container.appendChild(img);
            }
        }
    }

    // 文本选择检测：释放鼠标时若选中文字则显示引用按钮
    document.getElementById('chat-messages').addEventListener('mouseup', function(e) {
        var target = e.target;
        if (target && target.nodeType === 3) target = target.parentNode;
        if (target && target.closest && target.closest('.quote-btn')) return;
        // 延迟让 selection 稳定
        setTimeout(function() {
            var sel = window.getSelection();
            var text = sel ? sel.toString().trim() : '';
            if (!text) { hideQuoteButton(); return; }
            var node = sel.anchorNode;
            if (node) {
                if (node.nodeType === 3) node = node.parentNode;
                if (!node.closest('.msg')) { hideQuoteButton(); return; }
            }
            if (!sel.rangeCount) return;
            var range = sel.getRangeAt(0);
            var rect = range.getBoundingClientRect();
            if (!rect || (rect.width === 0 && rect.height === 0)) { hideQuoteButton(); return; }
            showQuoteButton(text, rect);
        }, 10);
    });

    // 引用按钮点击时不要关闭自己；点击其它区域则隐藏
    document.addEventListener('mousedown', function(e) {
        if (e.target && e.target.closest && e.target.closest('.quote-btn')) return;
        hideQuoteButton();
    });

    // 滚动时隐藏引用按钮
    document.getElementById('chat-messages').addEventListener('scroll', function() {
        hideQuoteButton();
    });

    // Escape 隐藏
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') hideQuoteButton();
    });

    function saveMessage(role, content) {
        fetch('/api/chat/' + encodeURIComponent(AI_CHAT_KEY) + '/save', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({role: role, content: content})
        }).catch(function(e) {
            console.warn('保存聊天记录失败:', e);
        });
    }

    document.getElementById('chat-msg').addEventListener('keydown', function(e) {
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendChat(); }
    });

    // ── 图片粘贴支持 ──
    var pastedImages = [];

    document.getElementById('chat-msg').addEventListener('paste', function(e) {
        var items = (e.clipboardData || window.clipboardData).items;
        for (var i = 0; i < items.length; i++) {
            if (items[i].type.indexOf('image') === 0) {
                e.preventDefault();
                var file = items[i].getAsFile();
                if (!file) continue;
                var reader = new FileReader();
                reader.onload = function(ev) {
                    var base64 = ev.target.result.split(',')[1];
                    pastedImages.push(base64);
                    showImagePreview();
                };
                reader.readAsDataURL(file);
                break;
            }
        }
    });

    function showImagePreview() {
        var area = document.getElementById('image-preview-area');
        area.innerHTML = '';
        if (pastedImages.length === 0) {
            area.style.display = 'none';
            return;
        }
        area.style.display = 'flex';
        for (var i = 0; i < pastedImages.length; i++) {
            var thumb = document.createElement('div');
            thumb.className = 'image-preview-thumb';
            thumb.innerHTML = '<img src="data:image/png;base64,' + pastedImages[i] + '">'
                + '<span class="image-preview-remove" onclick="removeImage(' + i + ')">&times;</span>';
            area.appendChild(thumb);
        }
    }

    function removeImage(idx) {
        pastedImages.splice(idx, 1);
        showImagePreview();
    }

    async function sendChat() {
        var input = document.getElementById('chat-msg');
        var sendBtn = document.querySelector('.chat-input > button');
        var msg = input.value.trim();
        var images = pastedImages.slice();
        if ((!msg || !msg.trim()) && images.length === 0) return;
        if (chatSending) return;
        chatSending = true;
        input.value = '';
        input.disabled = true;
        if (sendBtn) sendBtn.disabled = true;
        pastedImages = [];
        showImagePreview();
        var box = document.getElementById('chat-messages');
        var userDiv = document.createElement('div');
        renderUserMessage(userDiv, msg, images);
        box.appendChild(userDiv);
        await doSend(msg, images);
        chatSending = false;
        input.disabled = false;
        if (sendBtn) sendBtn.disabled = false;
        input.focus();
        box.scrollTop = box.scrollHeight;
    }

    async function doSend(msg, images) {
        images = images || [];
        retryMsg = msg;
        retryImages = images;
        var box = document.getElementById('chat-messages');
        var loadingId = 'ai-' + Date.now();
        var aiDiv = document.createElement('div');
        aiDiv.className = 'msg ai';
        aiDiv.id = loadingId;
        aiDiv.textContent = document.getElementById('web-search-cb').checked ? t('ai.searching') : t('ai.thinking');
        box.appendChild(aiDiv);
        box.scrollTop = box.scrollHeight;
        try {
            var bodyObj = { message: msg, history: chatHistory, web_search: document.getElementById('web-search-cb').checked };
            if (images.length > 0) bodyObj.images = images;
            var resp = await fetch('/api/ai/chat', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(bodyObj)
            });
            if (!resp.ok) throw new Error('服务器错误 (' + resp.status + ')');
            var data = await resp.json();
            document.getElementById(loadingId).innerHTML = DOMPurify.sanitize(escapeHtml(data.content).replace(/\n/g, '<br>'));
            chatHistory.push(["user", msg]);
            chatHistory.push(["assistant", data.content]);
            saveMessage('user', msg);
            saveMessage('assistant', data.content);
            retryMsg = '';
        } catch(e) {
            var el = document.getElementById(loadingId);
            el.innerHTML = DOMPurify.sanitize(
                '<div style="color:#f85149;">' + escapeHtml(t('ai.fail') + ': ' + e.message) + '</div>' +
                '<button onclick="retrySend()" class="btn-retry" style="background:#21262d;color:#c9d1d9;border:1px solid #30363d;padding:4px 12px;border-radius:4px;cursor:pointer;margin-top:8px;font-size:0.85em;">' + t('ai.retry') + '</button>'
            );
            el.classList.add('error');
        }
    }

    function retrySend() {
        var msg = retryMsg;
        var images = retryImages;
        if (!msg && (!images || images.length === 0)) return;
        retryMsg = '';
        retryImages = [];
        // 移除上一条错误消息
        var box = document.getElementById('chat-messages');
        var last = box.lastChild;
        if (last && last.classList.contains('msg')) {
            box.removeChild(last);
        }
        doSend(msg, images);
    }

    applyI18nCommon();
    </script>
</body>
</html>
